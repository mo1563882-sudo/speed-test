<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techovia Speed Test</title>
<style>
:root{--blue:#0a7cff;--bg:#f4f8ff}
body{
margin:0;
background:var(--bg);
font-family:tahoma, Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding: 10px;
box-sizing: border-box;
}
.card{
background:#fff;
width:100%;
max-width:520px;
padding:25px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
text-align:center;
box-sizing: border-box;
}
.title{
font-size:clamp(20px, 5vw, 24px);
font-weight:800;
color:var(--blue)
}
.speed{
font-size:clamp(36px, 10vw, 48px);
font-weight:900;
margin:10px 0;
color: #222;
}
.timer{
font-size:14px;
color:#666;
margin-bottom: 5px;
}
.quality{
font-size:13px;
margin-top:4px;
color:#444
}
canvas{
max-width: 100%;
height: auto;
margin-top:10px
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(80px, 1fr));
gap:10px;
margin-top:20px
}
.stat{
background:#f6f9ff;
padding:10px;
border-radius:8px
}
.stat span{
font-size:11px;
color:#777;
display:block;
white-space: nowrap;
}
.stat b{
color:var(--blue);
font-size: 13px;
}
button{
width:100%;
padding:14px;
margin-top:10px;
background:var(--blue);
color:#fff;
border:0;
border-radius:10px;
font-size:18px;
font-weight:700;
cursor:pointer;
transition: opacity 0.3s;
}
button.secondary{
background:#444
}
button:disabled{
background:#9bbef7;
cursor: not-allowed;
}
</style>
</head>
<body>

<div class="card">
<div class="title">Technovia Speed Test</div>
<canvas id="gauge" width="200" height="200"></canvas>
<div class="speed" id="speed">0 MB/s</div>
<div class="timer" id="timer"></div>
<div class="quality" id="quality"></div>
<canvas id="graph" width="400" height="120"></canvas>

<div class="grid">
<div class="stat"><span>الاستجابة (Ping)</span><b id="ping">-</b></div>
<div class="stat"><span>التقلب (Jitter)</span><b id="jitter">-</b></div>
<div class="stat"><span>الاستقرار</span><b id="stability">-</b></div>
<div class="stat"><span>التشويش</span><b id="noise">-</b></div>
<div class="stat"><span>التحميل الصافي</span><b id="down">-</b></div>
</div>

<button id="btn">فحص سريع (15 ثانية)</button>
<button id="btnPro" class="secondary">فحص متقدم (30 ثانية)</button>
</div>

<script>
const speedEl = document.getElementById("speed");
const timerEl = document.getElementById("timer");
const qualityEl = document.getElementById("quality");
const pingEl = document.getElementById("ping");
const jitterEl = document.getElementById("jitter");
const downEl = document.getElementById("down");
const stabilityEl = document.getElementById("stability");
const noiseEl = document.getElementById("noise");
const btn = document.getElementById("btn");
const btnPro = document.getElementById("btnPro");
const gauge = document.getElementById("gauge").getContext("2d");
const graph = document.getElementById("graph").getContext("2d");

let speeds = [];

// دالة التنسيق الجديدة للقياس بالميجا بايت والكيلو بايت
function formatSpeed(mbs) {
    if (mbs >= 1) {
        return mbs.toFixed(2) + " MB/s";
    } else {
        let kbs = mbs * 1024;
        return kbs.toFixed(0) + " KB/s";
    }
}

function quality(speedMB) {
    if (speedMB > 12.5) return "ممتاز 🚀"; // فوق 100 ميجا بيت
    if (speedMB > 4) return "جيد جداً";
    if (speedMB > 1.25) return "جيد";
    if (speedMB > 0.5) return "متوسط";
    return "ضعيف";
}

function drawGauge(speed) {
    let max = 25; // الحد الأقصى للعداد 25 ميجا بايت (يعادل 200 ميجا بيت)
    let angle = Math.min((speed / max), 1) * Math.PI;
    gauge.clearRect(0, 0, 200, 200);
    gauge.beginPath();
    gauge.arc(100, 100, 80, Math.PI, 2 * Math.PI);
    gauge.strokeStyle = "#eee";
    gauge.lineWidth = 12;
    gauge.stroke();
    gauge.beginPath();
    gauge.arc(100, 100, 80, Math.PI, Math.PI + angle);
    gauge.strokeStyle = "#0a7cff";
    gauge.lineWidth = 12;
    gauge.stroke();
}

function drawGraph() {
    graph.clearRect(0, 0, 400, 120);
    graph.beginPath();
    speeds.forEach((s, i) => {
        let x = i * (400 / 60);
        let y = 120 - Math.min((s * 4), 110);
        if (i == 0) graph.moveTo(x, y);
        else graph.lineTo(x, y);
    });
    graph.strokeStyle = "#0a7cff";
    graph.lineWidth = 2;
    graph.stroke();
}

async function pingTest() {
    let arr = [];
    for (let i = 0; i < 5; i++) {
        let s = performance.now();
        try {
            await fetch("https://speed.cloudflare.com/__down?bytes=1", { cache: "no-store" });
            arr.push(performance.now() - s);
        } catch(e) {}
    }
    let avg = arr.reduce((a, b) => a + b) / arr.length;
    let jitter = Math.sqrt(arr.map(x => (x - avg) ** 2).reduce((a, b) => a + b) / arr.length);
    return { ping: Math.round(avg), jitter: Math.round(jitter) };
}

async function downloadTest(seconds) {
    let start = performance.now();
    let controller = new AbortController();
    let bytes = 0;
    let isAborted = false;

    const timeout = setTimeout(() => {
        isAborted = true;
        controller.abort();
    }, seconds * 1000);

    try {
        let r = await fetch("https://speed.cloudflare.com/__down?bytes=500000000", {
            cache: "no-store",
            signal: controller.signal
        });
        let reader = r.body.getReader();
        
        let timeLeft = seconds;
        timerEl.innerText = "الوقت المتبقي " + timeLeft + " ث";
        let countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft >= 0) timerEl.innerText = "الوقت المتبقي " + timeLeft + " ث";
            if (timeLeft <= 0) clearInterval(countdown);
        }, 1000);

        while (!isAborted) {
            let { done, value } = await reader.read();
            if (done || isAborted) break;
            bytes += value.length;
            let t = (performance.now() - start) / 1000;
            // الحساب بالميجا بايت (حجم البيانات تقسيم 1024 مرتين)
            let speedMB = (bytes) / (1024 * 1024 * t);
            
            speedEl.innerText = formatSpeed(speedMB);
            qualityEl.innerText = quality(speedMB);
            drawGauge(speedMB);
            speeds.push(speedMB);
            if (speeds.length > 60) speeds.shift();
            drawGraph();
        }
    } catch (e) { } 
    finally {
        clearTimeout(timeout);
    }

    let totalTime = (performance.now() - start) / 1000;
    let finalSpeedMB = (bytes) / (1024 * 1024 * totalTime);
    
    let avg = speeds.reduce((a, b) => a + b, 0) / speeds.length;
    let stdev = Math.sqrt(speeds.map(x => (x - avg) ** 2).reduce((a, b) => a + b, 0) / speeds.length);
    let stability = Math.max(0, 100 - (stdev / avg * 100));
    let noise = (stdev / avg * 10).toFixed(1);

    return { speed: finalSpeedMB, stability: stability.toFixed(0) + "%", noise: noise + " dB" };
}

async function startTest(duration) {
    btn.disabled = true;
    btnPro.disabled = true;
    speeds = [];
    speedEl.innerText = "جاري البدء...";
    pingEl.innerText = "-";
    jitterEl.innerText = "-";
    downEl.innerText = "-";
    stabilityEl.innerText = "-";
    noiseEl.innerText = "-";
    
    try {
        let pj = await pingTest();
        pingEl.innerText = pj.ping + " ms";
        jitterEl.innerText = pj.jitter + " ms";

        let downResult = await downloadTest(duration);
        downEl.innerText = formatSpeed(downResult.speed);
        stabilityEl.innerText = downResult.stability;
        noiseEl.innerText = downResult.noise;

        timerEl.innerText = "انتهى الفحص";
    } catch (e) {
        timerEl.innerText = "حدث خطأ";
    }

    btn.disabled = false;
    btnPro.disabled = false;
}

btn.onclick = () => startTest(15);
btnPro.onclick = () => startTest(30);
</script>
</body>
</html>
