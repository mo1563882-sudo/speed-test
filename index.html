<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Techovia Speed Test Pro</title>
<style>
/* المتغيرات الأساسية للتباين (الوضع الفاتح) */
:root {
  --bg: #e0e5ec;
  --card-bg: #e0e5ec;
  --text-main: #2d3436;
  --text-muted: #636e72;
  --blue: #0984e3;
  --blue-hover: #74b9ff;
  --shadow-light: #ffffff;
  --shadow-dark: #a3b1c6;
  --border: #d1d9e6;
}

/* تباين عالي للوضع المظلم (Dark Mode) */
[data-theme="dark"] {
  --bg: #1a1b1e;
  --card-bg: #1a1b1e;
  --text-main: #f1f2f6; /* لون نص فاتح للتباين */
  --text-muted: #a4b0be;
  --blue: #4da3ff; /* أزرق فاتح يبرز على الخلفية الداكنة */
  --blue-hover: #0984e3;
  --shadow-light: #2a2b30;
  --shadow-dark: #0a0a0c;
  --border: #2f3542;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text-main);
  font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
  box-sizing: border-box;
  transition: background 0.3s ease, color 0.3s ease;
}

.card {
  background: var(--card-bg);
  width: 100%;
  max-width: 480px;
  padding: 25px;
  border-radius: 24px;
  box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 18px;
  transition: all 0.3s ease;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title {
  font-size: 22px;
  font-weight: 900;
  color: var(--blue);
  margin: 0;
}

.controls {
  display: flex;
  gap: 12px;
}

.icon-btn {
  background: var(--card-bg);
  border: none;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  cursor: pointer;
  color: var(--blue);
  font-size: 18px;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: all 0.2s ease;
}

.icon-btn:active {
  box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
}

.servers-select {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  background: var(--card-bg);
  border: none;
  color: var(--text-main);
  font-family: inherit;
  font-size: 13px;
  font-weight: bold;
  box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
  outline: none;
  appearance: none;
}

.speed-circle {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  margin: 10px auto;
  background: var(--card-bg);
  box-shadow: inset 8px 8px 16px var(--shadow-dark), inset -8px -8px 16px var(--shadow-light);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
}

.speed-circle::after {
  content: '';
  position: absolute;
  width: 145px;
  height: 145px;
  border-radius: 50%;
  background: var(--card-bg);
  box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
  z-index: 0;
}

.speed-val {
  font-size: 42px;
  font-weight: 900;
  color: var(--blue);
  z-index: 1;
}

.speed-unit {
  font-size: 15px;
  color: var(--text-muted);
  font-weight: bold;
  z-index: 1;
}

.status-text {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 700;
}

.progress-bar {
  width: 100%;
  height: 10px;
  background: var(--card-bg);
  border-radius: 5px;
  box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--blue);
  transition: width 0.3s ease;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.stat-box {
  background: var(--card-bg);
  padding: 15px;
  border-radius: 18px;
  box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.stat-box span {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 5px;
  font-weight: 700;
}

.stat-box b {
  font-size: 20px;
  color: var(--text-main);
  font-weight: 900;
}

.mini-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.mini-stat {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  font-weight: bold;
}

.mini-stat b {
  display: block;
  font-size: 14px;
  color: var(--text-main);
  margin-top: 3px;
}

.action-btn {
  width: 100%;
  padding: 16px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
  transition: all 0.2s ease;
  margin-top: 5px;
}

.action-btn:active {
  transform: scale(0.97);
  box-shadow: 2px 2px 5px var(--shadow-dark), -2px -2px 5px var(--shadow-light);
}

.action-btn:disabled {
  background: var(--text-muted);
  cursor: not-allowed;
  box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
}

/* API Mode styling */
body.api-mode { 
  background: #0d0d0d; 
  color: #00ff00; 
  font-family: monospace; 
  align-items: flex-start; 
  padding: 20px; 
}
.api-mode .card { display: none; }
</style>
</head>
<body>

<div class="card" id="mainCard">
  <div class="header">
    <div class="title" data-i18n="title">Techovia Pro</div>
    <div class="controls">
      <button class="icon-btn" id="langBtn" title="Language / اللغة">🌐</button>
      <button class="icon-btn" id="themeBtn" title="Dark Mode / الوضع المظلم">🌙</button>
    </div>
  </div>

  <select class="servers-select" id="serverSelect">
    <option value="cloudflare" data-i18n="server_cf">Cloudflare (توجيه تلقائي ذكي)</option>
    <option value="google" data-i18n="server_g">Google Edge (للمطورين)</option>
  </select>

  <div class="status-text" id="statusText" data-i18n="ready">جاهز للفحص</div>

  <div class="speed-circle">
    <div class="speed-val" id="mainSpeed">0.0</div>
    <div class="speed-unit">MB/s</div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="grid">
    <div class="stat-box">
      <span data-i18n="download">التحميل</span>
      <b id="downResult">--</b>
    </div>
    <div class="stat-box">
      <span data-i18n="upload">الرفع</span>
      <b id="upResult">--</b>
    </div>
  </div>

  <div class="mini-grid">
    <div class="mini-stat"><span data-i18n="ping">استجابة</span><b id="pingResult">--</b></div>
    <div class="mini-stat"><span data-i18n="jitter">تقلب</span><b id="jitterResult">--</b></div>
    <div class="mini-stat"><span data-i18n="bufferbloat">ضغط QoS</span><b id="bufferResult">--</b></div>
    <div class="mini-stat"><span data-i18n="video">فيديو</span><b id="videoResult">--</b></div>
  </div>

  <button class="action-btn" id="startBtn" data-i18n="start">بدء الفحص الشامل</button>
</div>

<script>
// ==========================================
// 1. نظام كشف الـ API (تصفية الواجهة للمطورين)
// ==========================================
const urlParams = new URLSearchParams(window.location.search);
const isApiMode = urlParams.get('api') === 'true';

if (isApiMode) {
  document.body.classList.add('api-mode');
  document.body.innerHTML = 'Running API Speed Test... Please wait.';
}

// ==========================================
// 2. إدارة الحالة واللغات (State & i18n)
// ==========================================
const state = {
  lang: 'ar',
  theme: 'light',
  isTesting: false
};

const dict = {
  ar: {
    title: "Techovia Pro", ready: "جاهز للفحص", download: "التحميل (Down)", 
    upload: "الرفع (Up)", ping: "استجابة", jitter: "تقلب", 
    bufferbloat: "ضغط QoS", video: "دقة فيديو", start: "بدء الفحص الشامل",
    testingDown: "جاري فحص سرعة التحميل المعالجة...", testingUp: "جاري دفق بيانات الرفع...", 
    testingPing: "جاري فحص استقرار الحزم...", done: "اكتمل الفحص بنجاح",
    server_cf: "Cloudflare (توجيه تلقائي ذكي)", server_g: "Google Edge (للمطورين)"
  },
  en: {
    title: "Techovia Pro", ready: "Ready to Test", download: "Download", 
    upload: "Upload", ping: "Ping", jitter: "Jitter", 
    bufferbloat: "Bufferbloat", video: "Video Qty", start: "Start Full Test",
    testingDown: "Testing Download Speed...", testingUp: "Testing Upload Streaming...", 
    testingPing: "Testing Packet Stability...", done: "Test Completed Successfully",
    server_cf: "Cloudflare (Smart Auto-Routing)", server_g: "Google Edge (Developers)"
  }
};

// ==========================================
// 3. تهيئة واجهة المستخدم (UI Setup)
// ==========================================
function initUI() {
  if (isApiMode) return;
  
  // اكتشاف لغة المتصفح التلقائية
  const browserLang = navigator.language.startsWith('ar') ? 'ar' : 'en';
  setLanguage(browserLang);
  
  // زر الوضع المظلم
  document.getElementById('themeBtn').onclick = () => {
    state.theme = state.theme === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', state.theme);
    document.getElementById('themeBtn').innerText = state.theme === 'light' ? '🌙' : '☀️';
  };

  // زر تغيير اللغة
  document.getElementById('langBtn').onclick = () => {
    setLanguage(state.lang === 'ar' ? 'en' : 'ar');
  };

  document.getElementById('startBtn').onclick = runFullTest;
}

function setLanguage(langCode) {
  state.lang = langCode;
  document.getElementById('html-root').setAttribute('lang', langCode);
  document.getElementById('html-root').setAttribute('dir', langCode === 'ar' ? 'rtl' : 'ltr');
  
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.innerText = dict[langCode][key];
  });
}

// ==========================================
// 4. الدوال الهندسية للشبكات (بدون كاش)
// ==========================================
function formatSpeed(bytesPerSec) {
  return (bytesPerSec / (1024 * 1024)).toFixed(1);
}

// أ- فحص الـ Ping والـ Jitter
async function measurePing(iterations = 5) {
  const pings = [];
  for (let i = 0; i < iterations; i++) {
    const start = performance.now();
    try {
      await fetch(`https://speed.cloudflare.com/__down?bytes=1&t=${Date.now()}`, { cache: "no-store", method: 'HEAD' });
      pings.push(performance.now() - start);
    } catch(e) {}
  }
  if (pings.length === 0) return { ping: 0, jitter: 0 };
  const avg = pings.reduce((a,b)=>a+b, 0) / pings.length;
  const jitter = Math.sqrt(pings.map(x => Math.pow(x - avg, 2)).reduce((a,b)=>a+b,0) / pings.length);
  return { ping: Math.round(avg), jitter: Math.round(jitter) };
}

// ب- فحص التحميل (مع قياس جودة الاتصال Bufferbloat بالخلفية)
async function downloadTest(durationSec = 8) {
  const start = performance.now();
  let bytes = 0;
  let isDone = false;
  let bloatPings = [];

  // فحص استجابة الشبكة أثناء الضغط (QoS)
  const bloatInterval = setInterval(async () => {
      if(isDone) return;
      let pStart = performance.now();
      try {
        await fetch(`https://speed.cloudflare.com/__down?bytes=1&t=${Date.now()}`, { cache: 'no-store', method: 'HEAD' });
        bloatPings.push(performance.now() - pStart);
      } catch(e){}
  }, 1000);

  const controller = new AbortController();
  const timeout = setTimeout(() => { controller.abort(); }, durationSec * 1000);

  try {
    const response = await fetch("https://speed.cloudflare.com/__down?bytes=100000000", { 
      cache: "no-store", 
      signal: controller.signal 
    });
    const reader = response.body.getReader();
    
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      bytes += value.length;
      if (!isApiMode) {
        const currentSpeed = formatSpeed(bytes / ((performance.now() - start) / 1000));
        document.getElementById('mainSpeed').innerText = currentSpeed;
        document.getElementById('progressFill').style.width = Math.min(((performance.now() - start)/(durationSec*1000))*100, 100) + '%';
      }
    }
  } catch (e) {} 
  finally {
    clearTimeout(timeout);
    isDone = true;
    clearInterval(bloatInterval);
  }

  const finalTime = (performance.now() - start) / 1000;
  const avgBloat = bloatPings.length ? Math.round(bloatPings.reduce((a,b)=>a+b,0)/bloatPings.length) : 0;
  return {
    speedMBps: (bytes / (1024 * 1024)) / finalTime,
    bufferbloat: avgBloat
  };
}

// ت- فحص الرفع المتقدم (POST Stream)
async function uploadTest(durationSec = 8) {
  const start = performance.now();
  let totalBytes = 0;
  const chunk = new Uint8Array(2 * 1024 * 1024); // حزمة 2 ميجا
  let isDone = false;

  const timeout = setTimeout(() => { isDone = true; }, durationSec * 1000);

  while (!isDone) {
    try {
      await fetch("https://speed.cloudflare.com/__up", {
        method: "POST",
        body: chunk,
        cache: "no-store",
        headers: { 'Content-Type': 'application/octet-stream' }
      });
      totalBytes += chunk.length;
      if (!isApiMode) {
        const currentSpeed = formatSpeed(totalBytes / ((performance.now() - start) / 1000));
        document.getElementById('mainSpeed').innerText = currentSpeed;
        document.getElementById('progressFill').style.width = Math.min(((performance.now() - start)/(durationSec*1000))*100, 100) + '%';
      }
    } catch(e) { break; }
  }
  
  const finalTime = (performance.now() - start) / 1000;
  return { speedMBps: (totalBytes / (1024 * 1024)) / finalTime };
}

// ث- تقييم جودة الفيديو (محاكاة Bitrate)
function estimateVideo(downMBps) {
  const mbps = downMBps * 8; 
  if (mbps >= 25) return "4K UHD";
  if (mbps >= 10) return "1080p HD";
  if (mbps >= 5) return "720p";
  return "SD";
}

// ==========================================
// 5. محرك الفحص الرئيسي للواجهة
// ==========================================
async function runFullTest() {
  if (isApiMode) return;
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  document.getElementById('progressFill').style.width = '0%';
  
  // 1. استجابة الشبكة (Ping)
  document.getElementById('statusText').innerText = dict[state.lang].testingPing;
  const pingRes = await measurePing();
  document.getElementById('pingResult').innerText = pingRes.ping + ' ms';
  document.getElementById('jitterResult').innerText = pingRes.jitter + ' ms';

  // 2. التحميل والـ Bufferbloat
  document.getElementById('statusText').innerText = dict[state.lang].testingDown;
  const downRes = await downloadTest(8);
  document.getElementById('downResult').innerText = downRes.speedMBps.toFixed(1) + ' MB/s';
  const bloatValue = downRes.bufferbloat > 0 ? (downRes.bufferbloat - pingRes.ping) : 0;
  document.getElementById('bufferResult').innerText = (bloatValue > 0 ? '+' + bloatValue : '0') + ' ms';
  document.getElementById('videoResult').innerText = estimateVideo(downRes.speedMBps);

  // 3. الرفع (Upload)
  document.getElementById('statusText').innerText = dict[state.lang].testingUp;
  const upRes = await uploadTest(6);
  document.getElementById('upResult').innerText = upRes.speedMBps.toFixed(1) + ' MB/s';
  document.getElementById('mainSpeed').innerText = downRes.speedMBps.toFixed(1); 

  document.getElementById('statusText').innerText = dict[state.lang].done;
  document.getElementById('progressFill').style.width = '100%';
  btn.disabled = false;
}

// ==========================================
// 6. تشغيل وضع الـ API (للمطورين)
// ==========================================
async function runAPI() {
  try {
    const pingRes = await measurePing(3);
    const downRes = await downloadTest(4);
    const upRes = await uploadTest(4);
    
    const result = {
      status: "success",
      timestamp: new Date().toISOString(),
      provider: "Techovia Edge Testing API",
      metrics: {
        ping_ms: pingRes.ping,
        jitter_ms: pingRes.jitter,
        download_MBps: parseFloat(downRes.speedMBps.toFixed(2)),
        upload_MBps: parseFloat(upRes.speedMBps.toFixed(2)),
        bufferbloat_ms: downRes.bufferbloat,
        video_streaming_quality: estimateVideo(downRes.speedMBps)
      }
    };
    document.body.innerHTML = `<pre style="color:#00ff00;">${JSON.stringify(result, null, 2)}</pre>`;
  } catch (e) {
    document.body.innerHTML = `<pre style="color:red;">{"status": "error", "message": "${e.message}"}</pre>`;
  }
}

// تهيئة الملف
if (isApiMode) {
  runAPI();
} else {
  initUI();
}
</script>
</body>
</html>
