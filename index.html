<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technovia Speed Test</title>

<style>

:root{--blue:#0a7cff;--bg:#f4f8ff}

body{
margin:0;background:var(--bg);
font-family:tahoma;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh
}

.card{
background:#fff;
width:95%;
max-width:520px;
padding:30px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
text-align:center
}

.title{
font-size:24px;
font-weight:800;
color:var(--blue)
}

.speedBox{
margin:20px 0
}

.speed{
font-size:48px;
font-weight:900
}

.timer{
font-size:14px;
color:#777
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px
}

.stat{
background:#f6f9ff;
padding:10px;
border-radius:8px
}

.stat span{
font-size:11px;
color:#777;
display:block
}

.stat b{
color:var(--blue)
}

button{
width:100%;
padding:14px;
margin-top:10px;
background:var(--blue);
color:#fff;
border:0;
border-radius:10px;
font-size:18px;
font-weight:700;
cursor:pointer
}

button.secondary{
background:#444
}

button:disabled{
background:#9bbef7
}

</style>
</head>

<body>

<div class="card">

<div class="title">Techovia Speed Test</div>

<div class="speedBox">
<div class="speed" id="speed">0 Mbps</div>
<div class="timer" id="timer"></div>
</div>

<div class="grid">

<div class="stat">
<span>Ping</span>
<b id="ping">-</b>
</div>

<div class="stat">
<span>Jitter</span>
<b id="jitter">-</b>
</div>

<div class="stat">
<span>Download</span>
<b id="down">-</b>
</div>

<div class="stat">
<span>Upload</span>
<b id="up">-</b>
</div>

</div>

<button id="btn">فحص سريع (15 ثانية)</button>
<button id="btnPro" class="secondary">فحص متقدم (30 ثانية)</button>

</div>

<script>

const speedEl=document.getElementById("speed")
const pingEl=document.getElementById("ping")
const jitterEl=document.getElementById("jitter")
const downEl=document.getElementById("down")
const upEl=document.getElementById("up")
const timerEl=document.getElementById("timer")
const btn=document.getElementById("btn")
const btnPro=document.getElementById("btnPro")

function formatSpeed(mbps){

if(mbps>=1) return mbps.toFixed(2)+" Mbps"

let mb=mbps/8

if(mb>=1) return mb.toFixed(2)+" MB/s"

return (mb*1024).toFixed(0)+" KB/s"

}

async function pingTest(){

let arr=[]

for(let i=0;i<4;i++){

let s=performance.now()

await fetch("https://speed.cloudflare.com/__down?bytes=1",{cache:"no-store"})

arr.push(performance.now()-s)

}

let avg=arr.reduce((a,b)=>a+b)/arr.length

let jitter=Math.sqrt(arr.map(x=>(x-avg)**2).reduce((a,b)=>a+b)/arr.length)

return{
ping:Math.round(avg),
jitter:Math.round(jitter)
}

}

async function downloadTest(seconds){

const duration=seconds*1000

const controller=new AbortController()

const start=performance.now()

let bytes=0

let timer=seconds

timerEl.innerText="الوقت المتبقي "+timer+" ث"

let countdown=setInterval(()=>{

timer--

timerEl.innerText="الوقت المتبقي "+timer+" ث"

if(timer<=0){

controller.abort()
clearInterval(countdown)

}

},1000)

try{

let r=await fetch("https://speed.cloudflare.com/__down?bytes=100000000",{
cache:"no-store",
signal:controller.signal
})

let reader=r.body.getReader()

while(true){

let {done,value}=await reader.read()

if(done) break

bytes+=value.length

let time=(performance.now()-start)/1000

let speed=(bytes*8)/(1024*1024*time)

speedEl.innerText=formatSpeed(speed)

}

}catch(e){}

let totalTime=(performance.now()-start)/1000

return(bytes*8)/(1024*1024*totalTime)

}

async function uploadTest(){

let size=4*1024*1024

let data=new Uint8Array(size)

let start=performance.now()

await fetch("https://speed.cloudflare.com/__up",{
method:"POST",
body:data
})

let time=(performance.now()-start)/1000

return(size*8)/(1024*1024*time)

}

async function startTest(duration){

btn.disabled=true
btnPro.disabled=true

timerEl.innerText=""

let pj=await pingTest()

pingEl.innerText=pj.ping+" ms"
jitterEl.innerText=pj.jitter+" ms"

let down=await downloadTest(duration)

downEl.innerText=formatSpeed(down)

let up=await uploadTest()

upEl.innerText=formatSpeed(up)

btn.disabled=false
btnPro.disabled=false

timerEl.innerText="انتهى الاختبار"

}

btn.onclick=()=>startTest(15)

btnPro.onclick=()=>startTest(30)

</script>

</body>
</html>
