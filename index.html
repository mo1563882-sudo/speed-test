<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Techovia Speed Test</title>
<style>
:root{--blue:#0a7cff;--bg:#f4f8ff;--gradient: linear-gradient(135deg, #0a7cff 0%, #00d4ff 100%)}
body{
margin:0;
background:var(--bg);
font-family:tahoma, Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow: hidden;
padding: 10px;
box-sizing: border-box;
}
.card{
background:#fff;
width:100%;
max-width:480px;
padding:clamp(15px, 4vw, 25px);
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
text-align:center;
box-sizing: border-box;
display: flex;
flex-direction: column;
gap: 5px;
}
.title{
font-size:clamp(18px, 5vw, 22px);
font-weight:800;
color:var(--blue);
margin-bottom: 5px;
}
.speed{
font-size:clamp(32px, 8vw, 42px);
font-weight:900;
margin:5px 0;
color: #222;
}
.timer{
font-size:12px;
color:#666;
}
.quality{
font-size:12px;
margin-top:2px;
color:#444;
font-weight: bold;
}
canvas#gauge{
max-width: 180px;
margin: 0 auto;
}
canvas#graph{
width: 100%;
height: 80px;
margin-top:5px;
background: #fafcff;
border-radius: 8px;
}
.grid{
display:grid;
grid-template-columns:repeat(3, 1fr);
gap:8px;
margin-top:10px
}
.stat{
background:#f6f9ff;
padding:8px;
border-radius:8px;
border: 1px solid #edf2f9;
}
.stat span{
font-size:10px;
color:#777;
display:block;
margin-bottom: 2px;
}
.stat b{
color:var(--blue);
font-size: 12px;
}
button{
width:100%;
padding:12px;
margin-top:5px;
background:var(--blue);
color:#fff;
border:0;
border-radius:10px;
font-size:16px;
font-weight:700;
cursor:pointer;
transition: transform 0.1s;
}
button.secondary{
background:#444
}
button:active{
transform: scale(0.98);
}
button:disabled{
background:#9bbef7;
cursor: not-allowed;
}
</style>
</head>
<body>

<div class="card">
<div class="title">Technovia Speed Test</div>
<canvas id="gauge" width="200" height="160"></canvas>
<div class="speed" id="speed">0 MB/s</div>
<div class="timer" id="timer">جاهز للفحص</div>
<div class="quality" id="quality">---</div>
<canvas id="graph" width="400" height="100"></canvas>

<div class="grid">
<div class="stat"><span>الاستجابة</span><b id="ping">-</b></div>
<div class="stat"><span>التقلب</span><b id="jitter">-</b></div>
<div class="stat"><span>الاستقرار</span><b id="stability">-</b></div>
<div class="stat"><span>التشويش</span><b id="noise">-</b></div>
<div class="stat" style="grid-column: span 2"><span>التحميل الصافي</span><b id="down">-</b></div>
</div>

<button id="btn">فحص سريع (15ث)</button>
<button id="btnPro" class="secondary">فحص متقدم (30ث)</button>
</div>

<script>
const speedEl = document.getElementById("speed");
const timerEl = document.getElementById("timer");
const qualityEl = document.getElementById("quality");
const pingEl = document.getElementById("ping");
const jitterEl = document.getElementById("jitter");
const downEl = document.getElementById("down");
const stabilityEl = document.getElementById("stability");
const noiseEl = document.getElementById("noise");
const btn = document.getElementById("btn");
const btnPro = document.getElementById("btnPro");
const gauge = document.getElementById("gauge").getContext("2d");
const graph = document.getElementById("graph").getContext("2d");

let speeds = [];
let currentMax = 5; // المدى الأولي 5 ميجا بايت

function formatSpeed(mbs) {
    if (mbs >= 1) return mbs.toFixed(2) + " MB/s";
    return (mbs * 1024).toFixed(0) + " KB/s";
}

function quality(speedMB) {
    if (speedMB > 12.5) return "ممتاز 🚀";
    if (speedMB > 4) return "جيد جداً";
    if (speedMB > 1.25) return "جيد";
    if (speedMB > 0.5) return "متوسط";
    return "ضعيف";
}

function drawGauge(speed) {
    // منطق التوسيع التلقائي للمدى
    if (speed > currentMax * 0.8) {
        if (currentMax === 5) currentMax = 20;
        else if (currentMax === 20) currentMax = 50;
        else if (currentMax === 50) currentMax = 100;
    }

    let angle = Math.min((speed / currentMax), 1) * Math.PI;
    gauge.clearRect(0, 0, 200, 200);

    // المسار الخلفي
    gauge.beginPath();
    gauge.arc(100, 100, 80, Math.PI, 2 * Math.PI);
    gauge.strokeStyle = "#eee";
    gauge.lineWidth = 10;
    gauge.lineCap = "round";
    gauge.stroke();

    // المسار الملون (التدرج والتوهج)
    let grad = gauge.createLinearGradient(0, 100, 200, 100);
    grad.addColorStop(0, "#0a7cff");
    grad.addColorStop(1, "#00d4ff");

    gauge.shadowBlur = 10;
    gauge.shadowColor = "rgba(10, 124, 255, 0.3)";
    
    gauge.beginPath();
    gauge.arc(100, 100, 80, Math.PI, Math.PI + angle);
    gauge.strokeStyle = grad;
    gauge.lineWidth = 12;
    gauge.lineCap = "round";
    gauge.stroke();
    
    gauge.shadowBlur = 0; // إعادة التوهج للصفر للرسومات الأخرى
}

function drawGraph() {
    graph.clearRect(0, 0, 400, 100);
    
    // رسم المنطقة المظللة (Area Chart)
    graph.beginPath();
    graph.moveTo(0, 100);
    speeds.forEach((s, i) => {
        let x = i * (400 / 60);
        let y = 100 - Math.min((s / currentMax * 80), 90);
        graph.lineTo(x, y);
    });
    graph.lineTo((speeds.length - 1) * (400/60), 100);
    graph.fillStyle = "rgba(10, 124, 255, 0.05)";
    graph.fill();

    // رسم الخط العلوي
    graph.beginPath();
    speeds.forEach((s, i) => {
        let x = i * (400 / 60);
        let y = 100 - Math.min((s / currentMax * 80), 90);
        if (i == 0) graph.moveTo(x, y);
        else graph.lineTo(x, y);
    });
    graph.strokeStyle = "#0a7cff";
    graph.lineWidth = 2;
    graph.stroke();
}

async function pingTest() {
    let arr = [];
    for (let i = 0; i < 5; i++) {
        let s = performance.now();
        try {
            await fetch("https://speed.cloudflare.com/__down?bytes=1", { cache: "no-store" });
            arr.push(performance.now() - s);
        } catch(e) {}
    }
    let avg = arr.reduce((a, b) => a + b) / arr.length;
    let jitter = Math.sqrt(arr.map(x => (x - avg) ** 2).reduce((a, b) => a + b) / arr.length);
    return { ping: Math.round(avg), jitter: Math.round(jitter) };
}

async function downloadTest(seconds) {
    let start = performance.now();
    let controller = new AbortController();
    let bytes = 0;
    let isAborted = false;
    currentMax = 5; // إعادة ضبط المدى عند كل فحص

    const timeout = setTimeout(() => {
        isAborted = true;
        controller.abort();
    }, seconds * 1000);

    try {
        let r = await fetch("https://speed.cloudflare.com/__down?bytes=500000000", {
            cache: "no-store",
            signal: controller.signal
        });
        let reader = r.body.getReader();
        
        let timeLeft = seconds;
        let countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft >= 0) timerEl.innerText = "الوقت المتبقي " + timeLeft + " ث";
            if (timeLeft <= 0) clearInterval(countdown);
        }, 1000);

        while (!isAborted) {
            let { done, value } = await reader.read();
            if (done || isAborted) break;
            bytes += value.length;
            let t = (performance.now() - start) / 1000;
            let speedMB = (bytes) / (1024 * 1024 * t);
            
            speedEl.innerText = formatSpeed(speedMB);
            qualityEl.innerText = quality(speedMB);
            drawGauge(speedMB);
            speeds.push(speedMB);
            if (speeds.length > 60) speeds.shift();
            drawGraph();
        }
    } catch (e) { } 
    finally { clearTimeout(timeout); }

    let totalTime = (performance.now() - start) / 1000;
    let finalSpeedMB = (bytes) / (1024 * 1024 * totalTime);
    
    let avg = speeds.reduce((a, b) => a + b, 0) / speeds.length;
    let stdev = Math.sqrt(speeds.map(x => (x - avg) ** 2).reduce((a, b) => a + b, 0) / speeds.length);
    let stability = Math.max(0, 100 - (stdev / avg * 100));
    let noise = (stdev / avg * 10).toFixed(1);

    return { speed: finalSpeedMB, stability: stability.toFixed(0) + "%", noise: noise + " dB" };
}

async function startTest(duration) {
    btn.disabled = true;
    btnPro.disabled = true;
    speeds = [];
    speedEl.innerText = "...";
    timerEl.innerText = "جاري الاتصال...";
    
    try {
        let pj = await pingTest();
        pingEl.innerText = pj.ping + " ms";
        jitterEl.innerText = pj.jitter + " ms";

        let downResult = await downloadTest(duration);
        downEl.innerText = formatSpeed(downResult.speed);
        stabilityEl.innerText = downResult.stability;
        noiseEl.innerText = downResult.noise;

        timerEl.innerText = "انتهى الفحص";
    } catch (e) {
        timerEl.innerText = "حدث خطأ";
    }

    btn.disabled = false;
    btnPro.disabled = false;
}

btn.onclick = () => startTest(15);
btnPro.onclick = () => startTest(30);

// رسم أولي عند التحميل
drawGauge(0);
</script>
</body>
</html>
