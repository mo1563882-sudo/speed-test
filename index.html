<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2563eb">
<meta name="description" content="Techovia Speed Test - Advanced Internet Speed Testing Tool">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Techovia">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%232563eb'/><path d='M30 50 L45 65 L70 35' stroke='white' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%232563eb'/><path d='M30 50 L45 65 L70 35' stroke='white' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">

<link rel="manifest" id="manifestLink">

<title>Techovia Speed Test v3.6</title>
<style>
:root {
    --primary: #2563eb;
    --primary-light: #eff6ff;
    --bg: #f8fafc;
    --card-bg: #ffffff;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --stat-bg: #f1f5f9;
    --calc-bg: #f8fafc;
    --graph-stroke: #3b82f6;
    --graph-fill: rgba(59, 130, 246, 0.1);
    --btn-sec: #475569;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --radius: 16px;
    --font: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

[data-theme="dark"] {
    --primary: #3b82f6;
    --primary-light: #1e293b;
    --bg: #0b0f19;
    --card-bg: #111827;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --border: #1f2937;
    --stat-bg: #1f2937;
    --calc-bg: #111827;
    --graph-stroke: #60a5fa;
    --graph-fill: rgba(96, 165, 250, 0.15);
    --btn-sec: #374151;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    background: var(--bg);
    color: var(--text-main);
    font-family: var(--font);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
    transition: background-color 0.3s ease, color 0.3s ease;
}

.card {
    background: var(--card-bg);
    width: 100%;
    max-width: 540px;
    padding: 24px;
    border-radius: var(--radius);
    box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.08);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: all 0.3s ease;
}

.header-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 8px;
}

.controls-group { display: flex; gap: 8px; flex-wrap: wrap; }

select, .icon-btn {
    background: var(--stat-bg);
    color: var(--text-main);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    font-family: var(--font);
    transition: all 0.2s;
    outline: none;
}
.icon-btn:hover, select:hover { background: var(--border); }

.title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-main);
    text-align: center;
    letter-spacing: -0.5px;
}

.speed-display { text-align: center; padding: 10px 0; }

.speed-value {
    font-size: clamp(40px, 8vw, 56px);
    font-weight: 800;
    color: var(--primary);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
    transition: all 0.3s ease;
}

.status-text {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
    margin-top: 8px;
}

.quality-badge {
    display: inline-block;
    padding: 4px 12px;
    background: var(--primary-light);
    color: var(--primary);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 12px;
    transition: all 0.3s ease;
}

.graph-container {
    position: relative;
    background: var(--stat-bg);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
}

canvas#graph {
    width: 100%;
    height: 120px;
    display: block;
}

.graph-label {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 10px;
    color: var(--text-muted);
    background: var(--card-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
}

.calc-section {
    background: var(--calc-bg);
    border: 1px solid var(--border);
    padding: 16px;
    border-radius: 12px;
}

.calc-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}
.calc-row:last-child { margin-bottom: 0; }

.calc-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
.calc-val { font-size: 14px; font-weight: 700; color: var(--text-main); }

input[type=range] { 
    width: 100%; 
    margin: 8px 0;
    accent-color: var(--primary);
    cursor: pointer;
}

.metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
}

.metric-box {
    background: var(--stat-bg);
    padding: 12px 8px;
    border-radius: 10px;
    text-align: center;
    border: 1px solid transparent;
    transition: all 0.3s ease;
}
.metric-label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px; font-weight: 500; }
.metric-value { color: var(--text-main); font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
.metric-box.span-2 { grid-column: span 2; }
.metric-box.highlight { border-color: var(--primary); background: var(--primary-light); }
.metric-box.updated { animation: highlight 1s ease; }

@keyframes highlight {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); box-shadow: 0 0 12px var(--primary); }
    100% { transform: scale(1); }
}

.scores-container {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 4px;
}

.score-row {
    display: flex;
    justify-content: space-between;
    background: var(--stat-bg);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
}
.score-title { color: var(--text-muted); font-weight: 500; }
.score-result { color: var(--text-main); font-weight: 700; }

.action-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 8px;
}

button.btn-main {
    width: 100%;
    padding: 14px;
    border: 0;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s, box-shadow 0.2s;
    font-family: var(--font);
    background: var(--primary); color: #fff;
}
button:disabled { opacity: 0.5; cursor: not-allowed; }
button:active:not(:disabled) { transform: translateY(1px); }

.footer-links { display: flex; gap: 8px; }
.footer-link {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
}
.footer-link:hover { background: var(--stat-bg); color: var(--text-main); }

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.modal.active { display: flex; }

.modal-content {
    background: var(--card-bg);
    border-radius: var(--radius);
    max-width: 600px;
    width: 100%;
    max-height: 80vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: modalSlide 0.3s ease;
}

@keyframes modalSlide {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
}

.modal-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-main);
}

.modal-close {
    background: var(--stat-bg);
    border: 1px solid var(--border);
    color: var(--text-main);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}
.modal-close:hover { background: var(--border); }

.modal-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
}

.dev-log {
    background: #0f172a;
    color: #10b981;
    font-family: ui-monospace, "SF Mono", Monaco, "Cascadia Code", monospace;
    font-size: 12px;
    padding: 16px;
    border-radius: 10px;
    direction: ltr;
    text-align: left;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    line-height: 1.6;
}

.progress-bar {
    width: 100%;
    height: 4px;
    background: var(--stat-bg);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
}

.progress-fill {
    height: 100%;
    background: var(--primary);
    width: 0%;
    transition: width 0.3s ease;
}

@media (max-width: 480px) {
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .metric-box.span-2 { grid-column: span 1; }
    .header-controls { flex-direction: column; align-items: stretch; }
    .controls-group { justify-content: center; }
}
</style>
</head>
<body>

<div class="card">
    <div class="header-controls">
        <select id="langSelect" onchange="TechoviaApp.changeLang(this.value)" aria-label="Language Selector">
            <option value="ar">العربية</option>
            <option value="en">English</option>
        </select>
        <div class="controls-group">
            <button class="icon-btn" onclick="TechoviaApp.openModal('dev')" aria-label="Developer Panel">Dev ⚙️</button>
            <button class="icon-btn" id="themeToggle" onclick="TechoviaApp.toggleTheme()" aria-label="Toggle Theme">Dark 🌙</button>
        </div>
    </div>

    <div class="title">Techovia Speed Test</div>
    
    <div class="speed-display">
        <div class="speed-value" id="speed">0.00</div>
        <div class="status-text" id="statusUnit">MB/s</div>
        <div class="status-text" id="timer" style="margin-top:4px;">جاهز للفحص</div>
        <div class="quality-badge" id="quality">تقييم الاتصال: غير متاح</div>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    </div>

    <div class="graph-container">
        <canvas id="graph" aria-label="Speed Graph" role="img"></canvas>
        <div class="graph-label" id="graphLabel">MB/s</div>
    </div>

    <div class="calc-section">
        <div class="calc-row">
            <span class="calc-label" data-i18n="time1gb">زمن تحميل 1 جيجابايت:</span>
            <span class="calc-val" id="time1gb">--:--</span>
        </div>
        <div style="margin: 12px 0;">
            <div class="calc-row">
                <span class="calc-label"><span data-i18n="customSize">حجم مخصص:</span> <span id="sliderVal">1000</span> MB</span>
                <span class="calc-val" id="customTime">--:--</span>
            </div>
            <input type="range" id="sizeSlider" min="10" max="10000" step="10" value="1000" aria-label="Custom Size Slider">
        </div>
    </div>

    <div class="metrics-grid">
        <div class="metric-box span-2 highlight"><span class="metric-label" data-i18n="down">التحميل (Download)</span><span class="metric-value" id="down">-</span></div>
        <div class="metric-box"><span class="metric-label" data-i18n="ping">الاستجابة</span><span class="metric-value" id="ping">-</span></div>
        <div class="metric-box"><span class="metric-label" data-i18n="jitter">التقلب</span><span class="metric-value" id="jitter">-</span></div>
    </div>

    <div class="action-buttons">
        <button id="btn" class="btn-main" data-i18n="btnQuick">بدء الفحص (15ث)</button>
        <div class="footer-links">
            <button class="footer-link" onclick="TechoviaApp.copyResults()" data-i18n="copy">نسخ التقرير</button>
            <button class="footer-link" onclick="TechoviaApp.exportJSON()" data-i18n="export">تصدير JSON</button>
        </div>
    </div>
</div>

<div class="modal" id="devModal" onclick="if(event.target===this) TechoviaApp.closeModal('dev')">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title">🛠️ Developer Console</div>
            <button class="modal-close" onclick="TechoviaApp.closeModal('dev')">×</button>
        </div>
        <div class="modal-body">
            <div class="dev-log" id="devPanel">Log initialized...</div>
        </div>
    </div>
</div>

<script>
const TechoviaApp = (function() {
    'use strict';
    
    let state = {
        speeds: [],
        currentMax: 5,
        lastFinalSpeed: 0,
        isRunning: false,
        currentLang: localStorage.getItem('techovia_lang') || 'ar',
        isDark: localStorage.getItem('techovia_theme') === 'dark',
        results: { ping: 0, jitter: 0, download: 0, timestamp: null }
    };
    
    const translations = {
        ar: { time1gb: "زمن تحميل 1 جيجابايت:", customSize: "حجم مخصص:", ping: "الاستجابة", jitter: "التقلب", down: "التحميل", btnQuick: "بدء الفحص (15ث)", copy: "نسخ", export: "تصدير", ready: "جاهز للفحص", conn: "جاري الاتصال...", downing: "جاري الفحص...", done: "اكتمل الفحص", err: "خطأ" },
        en: { time1gb: "1GB Download Time:", customSize: "Custom Size:", ping: "Ping", jitter: "Jitter", down: "Download", btnQuick: "Start Test (15s)", copy: "Copy", export: "Export", ready: "Ready", conn: "Connecting...", downing: "Testing...", done: "Completed", err: "Error" }
    };
    
    function getTxt(key) { return translations[state.currentLang][key] || translations['en'][key]; }
    function formatTime(seconds) {
        if (isNaN(seconds) || seconds === Infinity || seconds <= 0) return "--:--";
        let m = Math.floor(seconds / 60), s = Math.floor(seconds % 60);
        return `${m}د ${s}ث`;
    }
    
    function updateDevLog(data) {
        const p = document.getElementById('devPanel');
        p.innerHTML = `[${new Date().toLocaleTimeString()}] ${JSON.stringify(data)}\n${p.innerHTML}`;
    }

    function drawGraph() {
        const canvas = document.getElementById('graph');
        const ctx = canvas.getContext('2d');
        const width = canvas.width = canvas.clientWidth * 2;
        const height = canvas.height = 120 * 2;
        ctx.clearRect(0, 0, width, height);
        if (!state.speeds.length) return;
        
        ctx.beginPath();
        ctx.moveTo(0, height);
        state.speeds.forEach((s, i) => {
            let x = i * (width / (state.speeds.length - 1));
            let y = height - Math.min((s / state.currentMax * (height - 20)), height - 10);
            ctx.lineTo(x, y);
        });
        ctx.lineTo(width, height);
        ctx.fillStyle = "rgba(59, 130, 246, 0.1)";
        ctx.fill();
        ctx.strokeStyle = "#3b82f6";
        ctx.lineWidth = 4;
        ctx.stroke();
    }

    async function runPingTest() {
        let arr = [];
        for (let i = 0; i < 5; i++) {
            let s = performance.now();
            try {
                await fetch("https://speed.cloudflare.com/__down?bytes=1", { cache: "no-store" });
                arr.push(performance.now() - s);
            } catch(e) {}
        }
        let avg = arr.reduce((a, b) => a + b, 0) / arr.length;
        let jitter = Math.sqrt(arr.map(x => (x - avg) ** 2).reduce((a, b) => a + b, 0) / arr.length);
        return { ping: Math.round(avg), jitter: Math.round(jitter) };
    }

    async function runDownloadTest(seconds) {
        let start = performance.now();
        let bytes = 0;
        let isAborted = false;
        state.currentMax = 5;
        state.speeds = [];

        const timeout = setTimeout(() => { isAborted = true; }, seconds * 1000);

        try {
            let r = await fetch("https://speed.cloudflare.com/__down?bytes=500000000", { cache: "no-store" });
            let reader = r.body.getReader();
            
            while (!isAborted) {
                let { done, value } = await reader.read();
                if (done || isAborted) break;
                bytes += value.length;
                
                let t = (performance.now() - start) / 1000;
                let speedMB = (bytes) / (1024 * 1024 * t);
                if (speedMB > state.currentMax * 0.8) state.currentMax = speedMB * 1.5;
                
                document.getElementById("speed").innerText = speedMB.toFixed(2);
                document.getElementById("down").innerText = speedMB.toFixed(2) + " MB/s";
                state.speeds.push(speedMB);
                if (state.speeds.length > 60) state.speeds.shift();
                drawGraph();
                document.getElementById('progress').style.width = ((t / seconds) * 100) + '%';
            }
        } catch (e) { updateDevLog(e.message); }
        finally { clearTimeout(timeout); }

        let finalSpeedMB = (bytes) / (1024 * 1024 * seconds);
        return finalSpeedMB;
    }

    return {
        init: function() {
            if (state.isDark) document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('btn').onclick = async () => {
                state.isRunning = true;
                document.getElementById('btn').disabled = true;
                document.getElementById('timer').innerText = getTxt('conn');
                
                let pingRes = await runPingTest();
                document.getElementById('ping').innerText = pingRes.ping + " ms";
                document.getElementById('jitter').innerText = pingRes.jitter + " ms";
                
                document.getElementById('timer').innerText = getTxt('downing');
                let downRes = await runDownloadTest(15);
                
                state.results = { download: downRes.toFixed(2), ping: pingRes.ping, jitter: pingRes.jitter };
                document.getElementById('timer').innerText = getTxt('done');
                document.getElementById('btn').disabled = false;
                state.isRunning = false;
            };
        },
        changeLang: function(l) { state.currentLang = l; location.reload(); },
        toggleTheme: function() { 
            state.isDark = !state.isDark; 
            document.documentElement.setAttribute('data-theme', state.isDark ? 'dark' : 'light');
            localStorage.setItem('techovia_theme', state.isDark ? 'dark' : 'light');
        },
        openModal: function(t) { document.getElementById(t+'Modal').classList.add('active'); },
        closeModal: function(t) { document.getElementById(t+'Modal').classList.remove('active'); },
        copyResults: function() { navigator.clipboard.writeText(JSON.stringify(state.results)); alert("Copied!"); },
        exportJSON: function() { console.log(state.results); }
    };
})();
document.addEventListener('DOMContentLoaded', () => TechoviaApp.init());
</script>
</body>
</html>
