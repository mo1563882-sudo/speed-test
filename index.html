<html lang="ar" dir="rtl" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Techovia Speed Test v2.0</title>

<style>
:root {
    --primary: #2563eb;
    --primary-light: #eff6ff;
    --bg: #f8fafc;
    --card-bg: #ffffff;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --stat-bg: #f1f5f9;
    --calc-bg: #f8fafc;
    --graph-stroke: #3b82f6;
    --graph-fill: rgba(59, 130, 246, 0.1);
    --btn-sec: #475569;
    --radius: 16px;
    --font: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

[data-theme="dark"] {
    --primary: #3b82f6;
    --primary-light: #1e293b;
    --bg: #0b0f19;
    --card-bg: #111827;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --border: #1f2937;
    --stat-bg: #1f2937;
    --calc-bg: #111827;
    --graph-stroke: #60a5fa;
    --graph-fill: rgba(96, 165, 250, 0.15);
    --btn-sec: #374151;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text-main);
    font-family: var(--font);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
    box-sizing: border-box;
    transition: background-color 0.3s ease, color 0.3s ease;
}

.card {
    background: var(--card-bg);
    width: 100%;
    max-width: 520px;
    padding: 24px;
    border-radius: var(--radius);
    box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.05);
    border: 1px solid var(--border);
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: all 0.3s ease;
}

.header-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
}

.controls-group {
    display: flex;
    gap: 8px;
}

select, .icon-btn {
    background: var(--stat-bg);
    color: var(--text-main);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    font-family: var(--font);
    transition: all 0.2s;
    outline: none;
}
.icon-btn:hover, select:hover { background: var(--border); }

.title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-main);
    text-align: center;
    letter-spacing: -0.5px;
}

.speed-display {
    text-align: center;
    padding: 10px 0;
}

.speed-value {
    font-size: clamp(40px, 8vw, 56px);
    font-weight: 800;
    color: var(--primary);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
}

.status-text {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
    margin-top: 8px;
}

.quality-badge {
    display: inline-block;
    padding: 4px 12px;
    background: var(--primary-light);
    color: var(--primary);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 12px;
}

canvas#graph {
    width: 100%;
    height: 100px;
    background: var(--stat-bg);
    border-radius: 12px;
    border: 1px solid var(--border);
}

.calc-section {
    background: var(--calc-bg);
    border: 1px solid var(--border);
    padding: 16px;
    border-radius: 12px;
}

.calc-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}
.calc-row:last-child { margin-bottom: 0; }

.calc-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
.calc-val { font-size: 14px; font-weight: 700; color: var(--text-main); }

input[type=range] { 
    width: 100%; 
    margin: 8px 0;
    accent-color: var(--primary);
    cursor: pointer;
}

.metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
}

.metric-box {
    background: var(--stat-bg);
    padding: 12px 8px;
    border-radius: 10px;
    text-align: center;
    border: 1px solid transparent;
}
.metric-label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px; font-weight: 500; }
.metric-value { color: var(--text-main); font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
.metric-box.span-2 { grid-column: span 2; }
.metric-box.highlight { border-color: var(--primary); background: var(--primary-light); }

.scores-container {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 4px;
}

.score-row {
    display: flex;
    justify-content: space-between;
    background: var(--stat-bg);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
}
.score-title { color: var(--text-muted); font-weight: 500; }
.score-result { color: var(--text-main); font-weight: 700; }

.action-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 8px;
}

button.btn-main, button.btn-sub {
    width: 100%;
    padding: 14px;
    border: 0;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    font-family: var(--font);
}
button.btn-main { background: var(--primary); color: #fff; }
button.btn-sub { background: var(--btn-sec); color: #fff; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
button:active:not(:disabled) { transform: translateY(1px); }

.footer-links {
    display: flex;
    gap: 8px;
}
.footer-link {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
}
.footer-link:hover { background: var(--stat-bg); color: var(--text-main); }

#devPanel {
    display: none;
    padding: 12px;
    background: #0f172a;
    color: #10b981;
    font-family: ui-monospace, monospace;
    font-size: 11px;
    border-radius: 10px;
    text-align: left;
    direction: ltr;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    margin-top: 8px;
}
</style>
</head>
<body>

<div class="card">
    <div class="header-controls">
        <select id="langSelect" onchange="changeLang(this.value)">
            <option value="ar">العربية</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="tr">Türkçe</option>
            <option value="nl">Nederlands</option>

            <button class="icon-btn" onclick="toggleDev()">Dev ⚙️</button>
            <button class="icon-btn" id="themeToggle" onclick="toggleTheme()">Dark 🌙</button>
        </div>
    </div>

    <div class="title">Techovia Speed Test</div>
    
    <div class="speed-display">
        <div class="speed-value" id="speed">0.00</div>
        <div class="status-text" id="statusUnit">MB/s</div>
        <div class="status-text" id="timer" style="margin-top:4px;">جاهز للفحص</div>
        <div class="quality-badge" id="quality">تقييم الاتصال: غير متاح</div>
    </div>

    <canvas id="graph" width="400" height="100"></canvas>

    <div class="calc-section">
        <div class="calc-row">
            <span class="calc-label" data-i18n="time1gb">زمن تحميل 1 جيجابايت:</span>
            <span class="calc-val" id="time1gb">--:--</span>
        </div>
        <div style="margin: 12px 0;">
            <div class="calc-row">
                <span class="calc-label"><span data-i18n="customSize">حجم مخصص:</span> <span id="sliderVal">1000</span> MB</span>
                <span class="calc-val" id="customTime">--:--</span>
            </div>
            <input type="range" id="sizeSlider" min="10" max="10000" step="10" value="1000">
        </div>
    </div>

    <div class="metrics-grid">
        <div class="metric-box"><span class="metric-label" data-i18n="ping">الاستجابة</span><span class="metric-value" id="ping">-</span></div>
        <div class="metric-box"><span class="metric-label" data-i18n="jitter">التقلب</span><span class="metric-value" id="jitter">-</span></div>
        <div class="metric-box"><span class="metric-label" data-i18n="bloat">Bufferbloat</span><span class="metric-value" id="bufferbloat">-</span></div>
        <div class="metric-box"><span class="metric-label" data-i18n="stab">الاستقرار</span><span class="metric-value" id="stability">-</span></div>
        
        <div class="metric-box span-2 highlight"><span class="metric-label" data-i18n="down">التحميل (Download)</span><span class="metric-value" id="down">-</span></div>
        <div class="metric-box span-2 highlight"><span class="metric-label" data-i18n="up">الرفع (Upload)</span><span class="metric-value" id="up">-</span></div>
    </div>

    <div class="scores-container">
        <div class="score-row">
            <span class="score-title" data-i18n="gaming">أداء الألعاب التنافسية</span>
            <span class="score-result" id="scoreGaming">-</span>
        </div>
        <div class="score-row">
            <span class="score-title" data-i18n="stream">جودة بث الفيديو</span>
            <span class="score-result" id="scoreStream">-</span>
        </div>
        <div class="score-row">
            <span class="score-title" data-i18n="calls">مكالمات الفيديو (Zoom/Meet)</span>
            <span class="score-result" id="scoreCalls">-</span>
        </div>
    </div>

    <div class="action-buttons">
        <button id="btn" class="btn-main" data-i18n="btnQuick">بدء الفحص السريع (15ث)</button>
        <button id="btnPro" class="btn-sub" data-i18n="btnPro">بدء الفحص العميق (30ث)</button>
        
        <div class="footer-links">
            <button class="footer-link" onclick="copyResults()" data-i18n="copy">نسخ التقرير</button>
            <button class="footer-link" onclick="exportJSON()" data-i18n="export">تصدير JSON</button>
        </div>
    </div>

    <div id="devPanel">Log initialized...</div>
</div>

<script>
// --- Service Worker Inline Registration for PWA ---
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        const swBlob = new Blob([`self.addEventListener('fetch', (e) => {});`], { type: 'text/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
    });
}

// --- Translations ---
const translations = {
    ar: { time1gb: "زمن تحميل 1 جيجابايت:", customSize: "حجم مخصص:", ping: "الاستجابة", jitter: "التقلب", bloat: "Bufferbloat", stab: "الاستقرار", down: "التحميل (Download)", up: "الرفع (Upload)", gaming: "أداء الألعاب التنافسية", stream: "جودة بث الفيديو", calls: "مكالمات الفيديو (Zoom/Meet)", btnQuick: "بدء الفحص السريع (15ث)", btnPro: "بدء الفحص العميق (30ث)", copy: "نسخ التقرير", export: "تصدير JSON", ready: "جاهز للفحص", conn: "جاري تحليل الاتصال...", downing: "جاري قياس التحميل...", uping: "جاري قياس الرفع...", done: "اكتمل الفحص", err: "فشل الاتصال بالخادم", qGood: "جودة الاتصال: ممتازة", qAvg: "جودة الاتصال: متوسطة", qBad: "جودة الاتصال: ضعيفة", st4k: "ممتاز لـ 4K", stHd: "جيد جداً لـ 1080p", stSd: "متوسط لـ 720p", stBad: "ضعيف (SD)", gPro: "احترافي (تأخير منخفض)", gStab: "مستقر (جيد)", gLag: "غير مستقر (Lag)", cExcel: "ممتاز (بدون تقطيع)", cGood: "جيد", cBad: "ضعيف للاتصال المرئي" },
    en: { time1gb: "1GB Download Time:", customSize: "Custom Size:", ping: "Ping", jitter: "Jitter", bloat: "Bufferbloat", stab: "Stability", down: "Download", up: "Upload", gaming: "Competitive Gaming", stream: "Video Streaming", calls: "Video Calls (Zoom/Meet)", btnQuick: "Quick Test (15s)", btnPro: "Deep Test (30s)", copy: "Copy Report", export: "Export JSON", ready: "Ready to test", conn: "Connecting...", downing: "Testing Download...", uping: "Testing Upload...", done: "Test Completed", err: "Connection Error", qGood: "Connection Quality: Excellent", qAvg: "Connection Quality: Average", qBad: "Connection Quality: Poor", st4k: "4K Ready", stHd: "1080p HD Ready", stSd: "720p SD Quality", stBad: "Poor (SD)", gPro: "Pro (Low Ping)", gStab: "Stable", gLag: "Unstable (Lag)", cExcel: "Excellent (Clear)", cGood: "Good", cBad: "Poor Quality" },
    fr: { time1gb: "Temps pour 1 Go:", customSize: "Taille:", ping: "Latence", jitter: "Gigue", bloat: "Bufferbloat", stab: "Stabilité", down: "Téléchargement", up: "Envoi", gaming: "Jeu Compétitif", stream: "Streaming Vidéo", calls: "Appels Vidéo", btnQuick: "Test Rapide (15s)", btnPro: "Test Profond (30s)", copy: "Copier", export: "Exporter JSON", ready: "Prêt", conn: "Connexion...", downing: "Téléchargement...", uping: "Envoi...", done: "Terminé", err: "Erreur", qGood: "Qualité: Excellente", qAvg: "Qualité: Moyenne", qBad: "Qualité: Faible", st4k: "Prêt pour 4K", stHd: "HD 1080p", stSd: "SD 720p", stBad: "Faible (SD)", gPro: "Pro (Ping Bas)", gStab: "Stable", gLag: "Instable (Lag)", cExcel: "Excellent", cGood: "Bon", cBad: "Médiocre" },
    de: { time1gb: "1GB Downloadzeit:", customSize: "Benutzerdefiniert:", ping: "Ping", jitter: "Jitter", bloat: "Bufferbloat", stab: "Stabilität", down: "Download", up: "Upload", gaming: "Gaming", stream: "Video-Streaming", calls: "Videoanrufe", btnQuick: "Schnelltest (15s)", btnPro: "Tiefentest (30s)", copy: "Kopieren", export: "Exportieren", ready: "Bereit", conn: "Verbinde...", downing: "Download test...", uping: "Upload test...", done: "Abgeschlossen", err: "Fehler", qGood: "Qualität: Hervorragend", qAvg: "Qualität: Durchschnitt", qBad: "Qualität: Schlecht", st4k: "4K Bereit", stHd: "1080p HD", stSd: "720p SD", stBad: "Schlecht (SD)", gPro: "Pro (Niedriger Ping)", gStab: "Stabil", gLag: "Instabil (Lag)", cExcel: "Ausgezeichnet", cGood: "Gut", cBad: "Schlecht" },
    es: { time1gb: "Tiempo para 1GB:", customSize: "Tamaño:", ping: "Ping", jitter: "Fluctuación", bloat: "Bufferbloat", stab: "Estabilidad", down: "Descarga", up: "Subida", gaming: "Juegos", stream: "Streaming", calls: "Videollamadas", btnQuick: "Prueba rápida", btnPro: "Prueba profunda", copy: "Copiar", export: "Exportar", ready: "Listo", conn: "Conectando...", downing: "Descargando...", uping: "Subiendo...", done: "Completado", err: "Error", qGood: "Calidad: Excelente", qAvg: "Calidad: Media", qBad: "Calidad: Pobre", st4k: "Listo para 4K", stHd: "1080p HD", stSd: "720p SD", stBad: "Mala (SD)", gPro: "Pro (Ping Bajo)", gStab: "Estable", gLag: "Inestable (Lag)", cExcel: "Excelente", cGood: "Bueno", cBad: "Malo" },
    tr: { time1gb: "1GB İndirme Süresi:", customSize: "Özel Boyut:", ping: "Ping", jitter: "Jitter", bloat: "Bufferbloat", stab: "Kararlılık", down: "İndirme", up: "Yükleme", gaming: "Oyun", stream: "Yayın", calls: "Görüntülü Arama", btnQuick: "Hızlı Test", btnPro: "Derin Test", copy: "Kopyala", export: "Dışa Aktar", ready: "Hazır", conn: "Bağlanıyor...", downing: "İndiriliyor...", uping: "Yükleniyor...", done: "Tamamlandı", err: "Hata", qGood: "Kalite: Mükemmel", qAvg: "Kalite: Orta", qBad: "Kalite: Zayıf", st4k: "4K Uyumlu", stHd: "1080p HD", stSd: "720p SD", stBad: "Zayıf (SD)", gPro: "Profesyonel (Düşük Ping)", gStab: "Kararlı", gLag: "Kararsız (Lag)", cExcel: "Mükemmel (Kesintisiz)", cGood: "İyi", cBad: "Görüntülü İçin Zayıf" },
    nl: { time1gb: "1GB Download Tijd:", customSize: "Grootte:", ping: "Ping", jitter: "Jitter", bloat: "Bufferbloat", stab: "Stabiliteit", down: "Download", up: "Upload", gaming: "Gaming", stream: "Streaming", calls: "Videobellen", btnQuick: "Snel Test", btnPro: "Diep Test", copy: "Kopiëren", export: "Exporteren", ready: "Klaar", conn: "Verbunden...", downing: "Downloaden...", uping: "Uploaden...", done: "Voltooid", err: "Fout", qGood: "Kwaliteit: Uitstekend", qAvg: "Kwaliteit: Gemiddeld", qBad: "Kwaliteit: Slecht", st4k: "4K Gereed", stHd: "1080p HD", stSd: "720p SD", stBad: "Slecht (SD)", gPro: "Pro (Lage Ping)", gStab: "Stabiel", gLag: "Onstabiel (Lag)", cExcel: "Uitstekend", cGood: "Goed", cBad: "Slecht" }
};

let currentLang = localStorage.getItem('techovia_lang') || (navigator.language.startsWith('ar') ? 'ar' : 'en');
document.getElementById('langSelect').value = currentLang;

function getTxt(key) { return translations[currentLang][key] || translations['en'][key]; }

function changeLang(l) {
    currentLang = translations[l] ? l : 'en';
    localStorage.setItem('techovia_lang', currentLang);
    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    document.querySelectorAll('[data-i18n]').forEach(el => {
        el.innerText = getTxt(el.getAttribute('data-i18n'));
    });
    document.getElementById('timer').innerText = getTxt('ready');
    if(window.SpeedTestAPI && window.SpeedTestAPI.results && window.SpeedTestAPI.results.download > 0) {
        let res = window.SpeedTestAPI.results;
        calcScoresText(res.download, res.upload, res.ping, res.jitter, res.bufferbloat);
    }
}

// --- Theme ---
let isDark = localStorage.getItem('techovia_theme') === 'dark';
if(isDark) document.documentElement.setAttribute('data-theme', 'dark');

function toggleTheme() {
    isDark = !isDark;
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    localStorage.setItem('techovia_theme', isDark ? 'dark' : 'light');
    document.getElementById('themeToggle').innerText = isDark ? "Light ☀️" : "Dark 🌙";
    drawGraph();
}
document.getElementById('themeToggle').innerText = isDark ? "Light ☀️" : "Dark 🌙";

function toggleDev() {
    const p = document.getElementById('devPanel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function updateDevLog(data) {
    const p = document.getElementById('devPanel');
    const timeStr = new Date().toLocaleTimeString();
    p.innerHTML = `[${timeStr}] Update:\n` + JSON.stringify(data, null, 2);
}

// --- Logic & State ---
const speedEl = document.getElementById("speed");
const unitEl = document.getElementById("statusUnit");
const timerEl = document.getElementById("timer");
const qualityEl = document.getElementById("quality");
const pingEl = document.getElementById("ping");
const jitterEl = document.getElementById("jitter");
const bloatEl = document.getElementById("bufferbloat");
const downEl = document.getElementById("down");
const upEl = document.getElementById("up");
const stabilityEl = document.getElementById("stability");
const time1gbEl = document.getElementById("time1gb");
const sliderVal = document.getElementById("sliderVal");
const sizeSlider = document.getElementById("sizeSlider");
const customTimeEl = document.getElementById("customTime");
const graph = document.getElementById("graph").getContext("2d");

const sGaming = document.getElementById("scoreGaming");
const sCalls = document.getElementById("scoreCalls");
const sStream = document.getElementById("scoreStream");

window.SpeedTestAPI = { results: { ping: 0, jitter: 0, bufferbloat: 0, download: 0, upload: 0, stability: 0 } };

let speeds = [];
let currentMax = 5;
let lastFinalSpeed = 0;
let basePingMs = 0;
let smoothedSpeed = 0; // For digital counter stabilization

function formatTime(seconds) {
    if (isNaN(seconds) || seconds === Infinity || seconds <= 0) return "--:--";
    let h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60), s = Math.floor(seconds % 60);
    return h > 0 ? `${h}h ${m}m ${s}s` : `${m}m ${s}s`;
}

function updateCalculators(speedMB) {
    if (speedMB <= 0) return;
    time1gbEl.innerText = formatTime(1024 / speedMB);
    customTimeEl.innerText = formatTime(sizeSlider.value / speedMB);
}

sizeSlider.oninput = () => {
    sliderVal.innerText = sizeSlider.value;
    if (lastFinalSpeed > 0) updateCalculators(lastFinalSpeed);
};

function displayMainSpeed(mbs) {
    if (mbs >= 1) {
        speedEl.innerText = mbs.toFixed(2);
        unitEl.innerText = "MB/s";
    } else {
        speedEl.innerText = (mbs * 1024).toFixed(0);
        unitEl.innerText = "KB/s";
    }
}

function formatStat(mbs) { return mbs >= 1 ? mbs.toFixed(2) + " MB/s" : (mbs * 1024).toFixed(0) + " KB/s"; }

function calcScoresText(dMbs, uMbs, ping, jitter, bloat) {
    let q = dMbs > 10 ? getTxt('qGood') : dMbs > 3 ? getTxt('qAvg') : getTxt('qBad');
    qualityEl.innerText = q;

    // Stream logic
    sStream.innerText = dMbs > 25 ? getTxt('st4k') : dMbs > 10 ? getTxt('stHd') : dMbs > 3 ? getTxt('stSd') : getTxt('stBad');

    // Gaming logic
    let totalLat = ping + jitter + bloat;
    sGaming.innerText = totalLat < 50 ? getTxt('gPro') : totalLat < 100 ? getTxt('gStab') : getTxt('gLag');

    // Calls logic
    sCalls.innerText = (uMbs > 2 && dMbs > 5 && ping < 100) ? getTxt('cExcel') : (uMbs > 0.5 && dMbs > 2) ? getTxt('cGood') : getTxt('cBad');

    return q;
}

function drawGraph() {
    graph.clearRect(0, 0, 400, 100);
    
    const isDarkMode = document.documentElement.getAttribute('data-theme') === 'dark';
    const strokeColor = isDarkMode ? "#60a5fa" : "#3b82f6";
    const fillColor = isDarkMode ? "rgba(96, 165, 250, 0.15)" : "rgba(59, 130, 246, 0.1)";
    const gridColor = isDarkMode ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.03)";

    // Clear background grid for readability
    graph.strokeStyle = gridColor;
    graph.lineWidth = 1;
    for(let i = 20; i < 100; i += 20) {
        graph.beginPath(); graph.moveTo(0, i); graph.lineTo(400, i); graph.stroke();
    }
    for(let i = 50; i < 400; i += 50) {
        graph.beginPath(); graph.moveTo(i, 0); graph.lineTo(i, 100); graph.stroke();
    }

    if (!speeds.length) return;

    graph.beginPath();
    graph.moveTo(0, 100);
    speeds.forEach((s, i) => {
        let x = i * (400 / (speeds.length - 1 || 1));
        let y = 100 - Math.min((s / currentMax * 85), 95);
        graph.lineTo(x, y);
    });
    graph.lineTo(400, 100);
    graph.fillStyle = fillColor;
    graph.fill();

    graph.beginPath();
    speeds.forEach((s, i) => {
        let x = i * (400 / (speeds.length - 1 || 1));
        let y = 100 - Math.min((s / currentMax * 85), 95);
        if (i === 0) graph.moveTo(x, y);
        else graph.lineTo(x, y);
    });
    graph.strokeStyle = strokeColor;
    graph.lineWidth = 3;
    graph.stroke();
}

async function runPingTest() {
    let arr = [];
    for (let i = 0; i < 5; i++) {
        let s = performance.now();
        try {
            await fetch("https://speed.cloudflare.com/__down?bytes=0", { cache: "no-store", priority: "high" });
            arr.push(performance.now() - s);
        } catch(e) {}
    }
    let avg = arr.length ? arr.reduce((a, b) => a + b) / arr.length : 0;
    let jitter = arr.length ? Math.sqrt(arr.map(x => (x - avg) ** 2).reduce((a, b) => a + b) / arr.length) : 0;
    basePingMs = avg;
    return { ping: Math.round(avg), jitter: Math.round(jitter) };
}

async function runDownloadTest(seconds) {
    let start = performance.now();
    let totalBytes = 0;
    let isAborted = false;
    let activePings = [];
    currentMax = 5;
    smoothedSpeed = 0;

    let controllers = Array.from({length: 4}, () => new AbortController());
    
    // Sequential Bufferbloat tracker (Prevents stacking and false 15000ms+ issues)
    let bloatLock = false;
    let bloatInterval = setInterval(async () => {
        if (bloatLock || isAborted) return;
        bloatLock = true;
        let ts = performance.now();
        try {
            await fetch("https://speed.cloudflare.com/__down?bytes=0", { cache: "no-store", signal: controllers[0].signal });
            activePings.push(performance.now() - ts);
        } catch(e) {}
        bloatLock = false;
    }, 1000);

    const timeout = setTimeout(() => {
        isAborted = true;
        controllers.forEach(c => c.abort());
        clearInterval(bloatInterval);
    }, seconds * 1000);

    let fetchPromises = controllers.map(async (c) => {
        try {
            let r = await fetch("https://speed.cloudflare.com/__down?bytes=500000000", { cache: "no-store", signal: c.signal });
            if(r.body) {
                let reader = r.body.getReader();
                while (!isAborted) {
                    let { done, value } = await reader.read();
                    if (done || isAborted) break;
                    totalBytes += value.length;
                }
            }
        } catch (e) {}
    });

    let prevBytes = 0;
    let uiLoop = setInterval(() => {
        if(isAborted) { clearInterval(uiLoop); return; }
        let chunkBytes = totalBytes - prevBytes;
        prevBytes = totalBytes;
        
        let speedMB = (chunkBytes) / (1024 * 1024 * 0.25); 
        if(speedMB < 0) speedMB = 0;
        if (speedMB > currentMax * 0.8) currentMax = Math.max(5, speedMB * 1.5);

        // Exponential Moving Average to prevent wild fluctuations
        if(smoothedSpeed === 0) smoothedSpeed = speedMB;
        else smoothedSpeed = (smoothedSpeed * 0.65) + (speedMB * 0.35);

        displayMainSpeed(smoothedSpeed);
        updateCalculators(smoothedSpeed);
        
        speeds.push(speedMB);
        if (speeds.length > 60) speeds.shift();
        drawGraph();
    }, 250);

    await Promise.all(fetchPromises);
    clearInterval(uiLoop);
    clearInterval(bloatInterval);
    clearTimeout(timeout);

    let totalTime = (performance.now() - start) / 1000;
    let finalSpeedMB = (totalBytes) / (1024 * 1024 * totalTime);
    
    let avgBloat = activePings.length ? activePings.reduce((a,b)=>a+b,0)/activePings.length : basePingMs;
    let bloatDiff = Math.max(0, Math.round(avgBloat - basePingMs));

    let avg = speeds.reduce((a, b) => a + b, 0) / (speeds.length||1);
    let stdev = Math.sqrt(speeds.map(x => (x - avg) ** 2).reduce((a, b) => a + b, 0) / (speeds.length||1));
    let stability = Math.max(0, 100 - (stdev / (avg||1) * 100));

    return { speed: finalSpeedMB, stability: stability.toFixed(0), bloat: bloatDiff };
}

async function runUploadTest(seconds) {
    let start = performance.now();
    let totalBytes = 0;
    let isAborted = false;
    currentMax = 5;
    smoothedSpeed = 0;

    const timeout = setTimeout(() => { isAborted = true; }, seconds * 1000);
    
    let prevBytes = 0;
    let uiLoop = setInterval(() => {
        if(isAborted) { clearInterval(uiLoop); return; }
        let chunkBytes = totalBytes - prevBytes;
        prevBytes = totalBytes;
        
        let speedMB = (chunkBytes) / (1024 * 1024 * 0.25);
        if (speedMB < 0) speedMB = 0;
        if (speedMB > currentMax * 0.8) currentMax = Math.max(2, speedMB * 1.5);
        
        if(smoothedSpeed === 0) smoothedSpeed = speedMB;
        else smoothedSpeed = (smoothedSpeed * 0.65) + (speedMB * 0.35);

        displayMainSpeed(smoothedSpeed);
        
        speeds.push(speedMB);
        if (speeds.length > 60) speeds.shift();
        drawGraph();
    }, 250);

    // Dynamic Small chunks loop (64KB instead of 2MB) to keep the counter alive on slow connections
    while(!isAborted) {
        try {
            const chunk = new Uint8Array(64 * 1024); 
            await fetch("https://speed.cloudflare.com/__up", { 
                method: "POST", 
                body: chunk,
                cache: "no-store" 
            });
            totalBytes += chunk.length;
        } catch(e) {
            // Short artificial pause if connection glitches
            await new Promise(r => setTimeout(r, 50));
        }
    }

    clearInterval(uiLoop);
    clearTimeout(timeout);
    let totalTime = (performance.now() - start) / 1000;
    return { speed: (totalBytes) / (1024 * 1024 * totalTime) };
}

async function startTest(duration) {
    document.getElementById('btn').disabled = true;
    document.getElementById('btnPro').disabled = true;
    speeds = []; lastFinalSpeed = 0;
    displayMainSpeed(0);
    timerEl.innerText = getTxt('conn');
    
    qualityEl.innerText = "---";
    sGaming.innerText = "-"; sStream.innerText = "-"; sCalls.innerText = "-";
    
    try {
        updateDevLog({ status: "Ping Test Started" });
        let pj = await runPingTest();
        pingEl.innerText = pj.ping + " ms";
        jitterEl.innerText = pj.jitter + " ms";
        window.SpeedTestAPI.results.ping = pj.ping;
        window.SpeedTestAPI.results.jitter = pj.jitter;

        // Download Phase
        timerEl.innerText = getTxt('downing');
        updateDevLog({ status: "Download Phase" });
        let downRes = await runDownloadTest(duration * 0.6);
        downEl.innerText = formatStat(downRes.speed);
        stabilityEl.innerText = downRes.stability + "%";
        bloatEl.innerText = "+" + downRes.bloat + " ms";
        lastFinalSpeed = downRes.speed;
        updateCalculators(downRes.speed);
        
        window.SpeedTestAPI.results.download = Number(downRes.speed.toFixed(2));
        window.SpeedTestAPI.results.bufferbloat = downRes.bloat;
        window.SpeedTestAPI.results.stability = Number(downRes.stability);

        // Upload Phase
        speeds = []; 
        timerEl.innerText = getTxt('uping');
        updateDevLog({ status: "Upload Phase" });
        let upRes = await runUploadTest(duration * 0.4);
        upEl.innerText = formatStat(upRes.speed);
        window.SpeedTestAPI.results.upload = Number(upRes.speed.toFixed(2));

        // Finalize
        calcScoresText(downRes.speed, upRes.speed, pj.ping, pj.jitter, downRes.bloat);
        displayMainSpeed(downRes.speed); 
        timerEl.innerText = getTxt('done');

        updateDevLog(window.SpeedTestAPI.results);

    } catch (e) {
        timerEl.innerText = getTxt('err');
        updateDevLog({ error: e.message });
    }

    document.getElementById('btn').disabled = false;
    document.getElementById('btnPro').disabled = false;
}

document.getElementById('btn').onclick = () => startTest(15);
document.getElementById('btnPro').onclick = () => startTest(30);

    let text = `Techovia Speed Test\nDown: ${res.download} MB/s\nUp: ${res.upload} MB/s\nPing: ${res.ping}ms\nBufferbloat: +${res.bufferbloat}ms\nStability: ${res.stability}%`;

}

    let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(window.SpeedTestAPI.results, null, 2));
    let node = document.createElement('a');
    node.setAttribute("href", dataStr);
    node.setAttribute("download", "techovia_report.json");
    document.body.appendChild(node);
    node.click();
    node.remove();
}
