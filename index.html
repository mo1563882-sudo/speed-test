<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technovia Speed Test</title>

<style>
:root{--blue:#0a7cff;--bg:#f4f8ff;}

body{
margin:0;background:var(--bg);
font-family:tahoma;
display:flex;justify-content:center;align-items:center;
min-height:100vh
}

.card{
background:#fff;
width:95%;max-width:520px;
padding:30px;border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
text-align:center
}

.title{font-size:24px;font-weight:800;color:var(--blue)}

.speed{font-size:48px;font-weight:900;margin:20px 0}

.timer{
font-size:18px;
color:#555;
margin-top:-10px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;margin-top:20px
}

.stat{background:#f6f9ff;padding:10px;border-radius:8px}

.stat span{font-size:11px;color:#777;display:block}

.stat b{color:var(--blue)}

button{
width:100%;padding:14px;margin-top:20px;
background:var(--blue);color:#fff;border:0;
border-radius:10px;font-size:18px;font-weight:700;
cursor:pointer
}

button:disabled{background:#9bbef7}
</style>
</head>

<body>

<div class="card">

<div class="title">Techovia Speed Test</div>

<div class="speed" id="speed">0 Mbps</div>
<div class="timer" id="timer">15 ثانية</div>

<div class="grid">

<div class="stat">
<span>Ping</span>
<b id="ping">-</b>
</div>

<div class="stat">
<span>Jitter</span>
<b id="jitter">-</b>
</div>

<div class="stat">
<span>Download</span>
<b id="down">-</b>
</div>

<div class="stat">
<span>Upload</span>
<b id="up">-</b>
</div>

</div>

<button id="btn">بدء الاختبار</button>

</div>

<script>

const btn=document.getElementById("btn")
const speedEl=document.getElementById("speed")
const pingEl=document.getElementById("ping")
const jitterEl=document.getElementById("jitter")
const downEl=document.getElementById("down")
const upEl=document.getElementById("up")
const timerEl=document.getElementById("timer")

function formatSpeed(mbps){

if(mbps>=1){
return mbps.toFixed(2)+" Mbps"
}

let mb=mbps/8

if(mb>=1){
return mb.toFixed(2)+" MB/s"
}

return (mb*1024).toFixed(0)+" KB/s"

}

async function fetchTimeout(url,ms){

return Promise.race([
fetch(url,{cache:"no-store"}),
new Promise((_,reject)=>setTimeout(()=>reject("timeout"),ms))
])

}

async function pingTest(){

let arr=[]

for(let i=0;i<4;i++){

let s=performance.now()

await fetchTimeout("https://speed.cloudflare.com/__down?bytes=1",4000)

arr.push(performance.now()-s)

}

let avg=arr.reduce((a,b)=>a+b)/arr.length

let jitter=Math.sqrt(arr.map(x=>(x-avg)**2).reduce((a,b)=>a+b)/arr.length)

return{
ping:Math.round(avg),
jitter:Math.round(jitter)
}

}

async function downloadTest(){

const duration=15000
const start=performance.now()

let r=await fetch("https://speed.cloudflare.com/__down?bytes=50000000",{cache:"no-store"})

let reader=r.body.getReader()

let bytes=0

let timer=15

timerEl.innerText=timer+" ثانية"

let countdown=setInterval(()=>{
timer--
timerEl.innerText=timer+" ثانية"
if(timer<=0)clearInterval(countdown)
},1000)

while(true){

const {done,value}=await reader.read()

if(done)break

bytes+=value.length

let time=performance.now()-start

if(time>duration)break

let seconds=time/1000

let speed=(bytes*8)/(1024*1024*seconds)

speedEl.innerText=formatSpeed(speed)

}

clearInterval(countdown)

let totalTime=(performance.now()-start)/1000

return(bytes*8)/(1024*1024*totalTime)

}

async function uploadTest(){

let size=2*1024*1024

let data=new Uint8Array(size)

let start=performance.now()

await fetch("https://speed.cloudflare.com/__up",{method:"POST",body:data})

let time=(performance.now()-start)/1000

return(size*8)/(1024*1024*time)

}

btn.onclick=async()=>{

btn.disabled=true
btn.innerText="جاري الاختبار..."

try{

let pj=await pingTest()

pingEl.innerText=pj.ping+" ms"
jitterEl.innerText=pj.jitter+" ms"

let down=await downloadTest()

downEl.innerText=formatSpeed(down)

let up=await uploadTest()

upEl.innerText=formatSpeed(up)

btn.innerText="إعادة الاختبار"
btn.disabled=false

}

catch(e){

btn.innerText="فشل الاختبار"
btn.disabled=false

}

}

</script>

</body>
</html>
