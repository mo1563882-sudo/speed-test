<style>
:root{--blue:#0a7cff;--bg:#f4f8ff;--card:#fff;--text:#222;--sub:#777;--border:#edf2f9;--shadow:rgba(0,0,0,.08)}
[data-theme="dark"]{--blue:#4dabff;--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--sub:#94a3b8;--border:#334155;--shadow:rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box;transition:background .3s,color .3s,border-color .3s}
body{background:var(--bg);font-family:tahoma,Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;padding:10px}
.card{background:var(--card);width:100%;max-width:520px;padding:20px;border-radius:20px;box-shadow:0 10px 40px var(--shadow);text-align:center;display:flex;flex-direction:column;gap:12px;animation:slideUp .5s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes spin{to{transform:rotate(360deg)}}
.title{font-size:clamp(20px,5vw,26px);font-weight:900;color:var(--blue);display:flex;align-items:center;justify-content:center;gap:8px}
.speed-display{font-size:clamp(36px,10vw,52px);font-weight:900;color:var(--text);line-height:1.2}
.speed-unit{font-size:clamp(14px,3vw,18px);color:var(--sub);font-weight:600}
.quality-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-top:4px}
.quality-excellent{background:#dcfce7;color:#166534}
.quality-good{background:#dbeafe;color:#1e40af}
.quality-fair{background:#fef3c7;color:#92400e}
.quality-poor{background:#fee2e2;color:#991b1b}
[data-theme="dark"] .quality-excellent{background:#14532d;color:#86efac}
[data-theme="dark"] .quality-good{background:#1e3a5f;color:#93c5fd}
[data-theme="dark"] .quality-fair{background:#78350f;color:#fcd34d}
[data-theme="dark"] .quality-poor{background:#7f1d1d;color:#fca5a5}
canvas#graph{width:100%;height:90px;background:var(--bg);border-radius:12px;border:1px solid var(--border)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--bg);padding:10px 6px;border-radius:12px;border:1px solid var(--border)}
.stat span{font-size:10px;color:var(--sub);display:block;margin-bottom:2px}
.stat b{color:var(--blue);font-size:13px;display:block}
.score-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:4px}
.score-card{background:var(--bg);padding:10px;border-radius:12px;border:1px solid var(--border);text-align:center}
.score-card .s-icon{font-size:24px;margin-bottom:4px}
.score-card .s-val{font-size:18px;font-weight:800;color:var(--blue)}
.score-card .s-label{font-size:10px;color:var(--sub);margin-top:2px}
.video-quality{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
.vq-item{background:var(--bg);padding:8px 4px;border-radius:10px;border:1px solid var(--border);text-align:center;font-size:11px}
.vq-item.active{border-color:var(--blue);background:rgba(10,124,255,.1)}
.vq-item .vq-label{color:var(--sub);display:block;font-size:9px}
.vq-item .vq-val{color:var(--text);font-weight:700;font-size:12px}
.controls{display:flex;gap:8px;margin-top:4px}
button{flex:1;padding:14px;border:0;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s}
button:active{transform:scale(.97)}
button:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.top-bar .icon-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:6px;border-radius:8px;transition:background .2s}
.top-bar .icon-btn:hover{background:var(--bg)}
.dev-panel{display:none;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px;margin-top:8px;text-align:right;font-size:11px;color:var(--sub);max-height:200px;overflow-y:auto}

let currentLang = localStorage.getItem('tv_lang') || detectLang();
function detectLang(){
  let l = navigator.language || navigator.userLanguage;
  if(l.startsWith('ar')) return 'ar';
  if(l.startsWith('fr')) return 'fr';
  if(l.startsWith('de')) return 'de';
  if(l.startsWith('es')) return 'es';
  if(l.startsWith('tr')) return 'tr';
  if(l.startsWith('nl')) return 'nl';
  return 'en';
}
function t(key){return i18n[currentLang]?.[key]||i18n.en[key]||key}
function changeLang(l){currentLang=l;localStorage.setItem('tv_lang',l);document.getElementById('langSelect').value=l;applyLang()}

// ==================== THEME ====================
let isDark = localStorage.getItem('tv_theme')==='dark';
function toggleTheme(){
  isDark=!isDark;
  localStorage.setItem('tv_theme',isDark?'dark':'light');

  document.getElementById('themeBtn').textContent=isDark?'☀️':'🌙';

// ==================== DEV MODE ====================

  document.getElementById('devPanel').classList.toggle('show',devMode);
  document.getElementById('devBtn').textContent=devMode?'✅':'🔧';
}

// ==================== GRAPH ====================
const graphCanvas = document.getElementById('graph');
const gCtx = graphCanvas.getContext('2d');
let speedHistory = [];
let uploadHistory = [];
let currentMaxSpeed = 5;

function drawGraph(data, color){
  const w = graphCanvas.width, h = graphCanvas.height;
  gCtx.clearRect(0,0,w,h);
  
  // Grid
  gCtx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border');
  gCtx.lineWidth = 0.5;
  for(let i=0;i<5;i++){
    let y = (h/4)*i;
    gCtx.beginPath();gCtx.moveTo(0,y);gCtx.lineTo(w,y);gCtx.stroke();
  }
  
  if(data.length<2) return;
  
  // Fill
  gCtx.beginPath();
  gCtx.moveTo(0,h);
  data.forEach((v,i)=>{
    let x = (i/(data.length-1))*w;
    let y = h - Math.min(v/currentMaxSpeed*h*0.9, h*0.9);
    gCtx.lineTo(x,y);
  });
  gCtx.lineTo(w,h);
  gCtx.closePath();
  gCtx.fillStyle = color+'15';
  gCtx.fill();
  
  // Line
  gCtx.beginPath();
  data.forEach((v,i)=>{
    let x = (i/(data.length-1))*w;
    let y = h - Math.min(v/currentMaxSpeed*h*0.9, h*0.9);
    if(i===0) gCtx.moveTo(x,y); else gCtx.lineTo(x,y);
  });
  gCtx.strokeStyle = color;
  gCtx.lineWidth = 2.5;
  gCtx.lineJoin = 'round';
  gCtx.stroke();
  
  // Dots
  data.forEach((v,i)=>{
    if(i%Math.max(1,Math.floor(data.length/30))!==0) return;
    let x = (i/(data.length-1))*w;
    let y = h - Math.min(v/currentMaxSpeed*h*0.9, h*0.9);
    gCtx.beginPath();
    gCtx.arc(x,y,3,0,Math.PI*2);
    gCtx.fillStyle = color;
    gCtx.fill();
  });
}

// ==================== UTILITIES ====================
function formatSpeed(mbs){
  if(mbs>=1) return mbs.toFixed(2)+' MB/s';
  return (mbs*1024).toFixed(0)+' KB/s';
}
function formatTime(s){
  if(isNaN(s)||s===Infinity) return '--:--';
  let h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);
  if(h>0) return `${h}س ${m}د ${sec}ث`;
  return `${m}د ${sec}ث`;
}
function qualityClass(mbs){
  if(mbs>12.5) return 'excellent';
  if(mbs>4) return 'good';
  if(mbs>1.25) return 'fair';
  return 'poor';
}

// ==================== MEASUREMENT ENGINE ====================
let testResults = {};

async function pingTest(){
  let pings=[];
  for(let i=0;i<10;i++){
    let s=performance.now();
    try{await fetch('https://speed.cloudflare.com/__down?bytes=1',{cache:'no-store',mode:'no-cors'});}catch(e){}
    pings.push(performance.now()-s);
    await new Promise(r=>setTimeout(r,100));
  }
  let avg=pings.reduce((a,b)=>a+b,0)/pings.length;
  let jitter=Math.sqrt(pings.map(x=>Math.pow(x-avg,2)).reduce((a,b)=>a+b,0)/pings.length);
  return{ping:Math.round(avg),jitter:Math.round(jitter),pings};
}

async function uploadTest(duration){
  let bytes=0,start=performance.now();
  let controller=new AbortController();
  let timeout=setTimeout(()=>controller.abort(),duration*1000);
  
  try{
    // Generate random data to upload
    let chunkSize=50000;
    let data=new Uint8Array(chunkSize);
    crypto.getRandomValues(data);
    
    let res=await fetch('https://speed.cloudflare.com/__up',{
      method:'POST',
      body:data,
      cache:'no-store',
      mode:'no-cors',
      signal:controller.signal
    });
    
    let reader=res.body.getReader();
    while(!controller.signal.aborted){
      let{done,value}=await reader.read();
      if(done)break;
      bytes+=value.length;
      let t=(performance.now()-start)/1000;
      if(t>0){
        let spd=(bytes/1024/1024)/t;
        uploadHistory.push(spd);
        if(uploadHistory.length>60)uploadHistory.shift();
        drawGraph(uploadHistory,'#10b981');
        document.getElementById('sValUpload').textContent=formatSpeed(spd);
      }
    }
  }catch(e){}
  finally{clearTimeout(timeout)}
  
  let totalTime=(performance.now()-start)/1000;
  return totalTime>0?{speed:(bytes/1024/1024)/totalTime,bytes}:{speed:0,bytes};
}

async function downloadTest(duration, multiConn=false){
  let bytes=0,start=performance.now();
  let controller=new AbortController();
  let timeout=setTimeout(()=>controller.abort(),duration*1000);
  speedHistory=[];
  
  try{
    if(multiConn){
      // Multi-connection: 3 simultaneous downloads
      let promises=[];
      for(let i=0;i<3;i++){
        promises.push((async()=>{
          let b=0,s=performance.now();
          try{
            let r=await fetch('https://speed.cloudflare.com/__down?bytes=500000000',{cache:'no-store',mode:'no-cors',signal:controller.signal});
            let reader=r.body.getReader();
            while(!controller.signal.aborted){
              let{done,value}=await reader.read();
              if(done)break;
              b+=value.length;
              let t=(performance.now()-s)/1000;
              if(t>0){
                let spd=(b/1024/1024)/t;
                speedHistory.push(spd);
                if(speedHistory.length>60)speedHistory.shift();
                drawGraph(speedHistory,'#0a7cff');
                document.getElementById('speedValue').textContent=spd.toFixed(2);
                document.getElementById('speedUnit').textContent='MB/s';
              }
            }
          }catch(e){}
          return b;
        })());
      }
      let results=await Promise.all(promises);
      bytes=results.reduce((a,b)=>a+b,0);
    }else{
      let r=await fetch('https://speed.cloudflare.com/__down?bytes=500000000',{cache:'no-store',mode:'no-cors',signal:controller.signal});
      let reader=r.body.getReader();
      while(!controller.signal.aborted){
        let{done,value}=await reader.read();
        if(done)break;
        bytes+=value.length;
        let t=(performance.now()-start)/1000;
        if(t>0){
          let spd=(bytes/1024/1024)/t;
          speedHistory.push(spd);
          if(speedHistory.length>60)speedHistory.shift();
          currentMaxSpeed=Math.max(currentMaxSpeed,spd*1.2);
          drawGraph(speedHistory,'#0a7cff');
          document.getElementById('speedValue').textContent=spd.toFixed(2);
          document.getElementById('speedUnit').textContent='MB/s';
        }
      }
    }
  }catch(e){}
  finally{clearTimeout(timeout)}
  
  let totalTime=(performance.now()-start)/1000;
  let finalSpeed=totalTime>0?(bytes/1024/1024)/totalTime:0;
  
  // Stats
  let avg=speedHistory.reduce((a,b)=>a+b,0)/speedHistory.length;
  let stdev=speedHistory.length>1?Math.sqrt(speedHistory.map(x=>Math.pow(x-avg,2)).reduce((a,b)=>a+b,0)/speedHistory.length):0;
  let stability=avg>0?Math.max(0,Math.min(100,100-(stdev/avg*100))):0;
  let noise=avg>0?(stdev/avg*10).(gaming),videoCall:Math.round(vc),streaming:Math.round(stream),overall};
}

function videoQualityExpected(speed){

  q['4k']=speed>=25?'✅':'❌';
  q['8k']=speed>=50?'✅':'❌';

}

if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='techovia-v2';
    self.addEventListener('install',e=>{self.skipWaiting()});
    self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});
    self.addEventListener('fetch',e=>{
      e.respondWith(
        caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
          let clone=res.clone();
          caches.open(CACHE).then(c=>c.put(e.request,clone));
          return res;
        }).catch(()=>new Response('Offline')))
      );
    });
  `;
  let blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
