<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Technovia Ultimate Speed Test</title>

<style>

:root{
--blue:#0a7cff;
--light:#f4f8ff;
--card:#ffffff;
}

body{
margin:0;
background:var(--light);
font-family:tahoma;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{

width:95%;
max-width:620px;

background:var(--card);

padding:35px;

border-radius:22px;

box-shadow:0 15px 45px rgba(0,0,0,0.08);

text-align:center;

}

.title{
font-size:28px;
font-weight:900;
color:var(--blue);
}

.subtitle{
color:#666;
margin-bottom:30px;
}

.gauge{

width:260px;
height:260px;
margin:auto;
position:relative;

}

.gauge svg{
transform:rotate(-90deg);
}

.bg{
stroke:#e6eefc;
stroke-width:22;
}

.bar{
stroke:var(--blue);
stroke-width:22;
stroke-linecap:round;
stroke-dasharray:565;
stroke-dashoffset:565;
transition:stroke-dashoffset .1s linear;
}

.speedBox{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

}

.speed{
font-size:54px;
font-weight:900;
color:#111;
}

.unit{
color:var(--blue);
font-weight:700;
}

.stats{

display:grid;

grid-template-columns:repeat(4,1fr);

margin-top:30px;

gap:12px;

}

.stat{

background:#f6f9ff;

padding:12px;

border-radius:10px;

}

.stat span{

font-size:11px;

color:#777;

display:block;

}

.stat b{

color:var(--blue);

font-size:17px;

}

button{

width:100%;

padding:16px;

margin-top:30px;

border:0;

border-radius:12px;

background:var(--blue);

color:white;

font-size:19px;

font-weight:800;

cursor:pointer;

}

button:disabled{
background:#9dbcf9;
}

canvas{
margin-top:20px;
width:100%;
height:130px;
}

.details{
margin-top:15px;
font-size:13px;
color:#444;
}

</style>

</head>

<body>

<div class="card">

<div class="title">Technovia Speed Test</div>
<div class="subtitle">اختبار سرعة الإنترنت المتقدم</div>

<div class="gauge">

<svg width="260" height="260">

<circle cx="130" cy="130" r="90" fill="none" class="bg"></circle>
<circle id="bar" cx="130" cy="130" r="90" fill="none" class="bar"></circle>

</svg>

<div class="speedBox">

<div class="speed" id="speed">0</div>
<div class="unit">Mbps</div>

</div>

</div>

<div class="stats">

<div class="stat">
<span>Ping</span>
<b id="ping">-</b>
</div>

<div class="stat">
<span>Jitter</span>
<b id="jitter">-</b>
</div>

<div class="stat">
<span>Download</span>
<b id="down">-</b>
</div>

<div class="stat">
<span>Upload</span>
<b id="up">-</b>
</div>

</div>

<button id="btn">بدء الاختبار</button>

<canvas id="chart"></canvas>

<div class="details" id="details"></div>

</div>

<script>

const btn=document.getElementById("btn")

const speedEl=document.getElementById("speed")
const pingEl=document.getElementById("ping")
const jitterEl=document.getElementById("jitter")
const downEl=document.getElementById("down")
const upEl=document.getElementById("up")
const bar=document.getElementById("bar")
const chart=document.getElementById("chart")
const ctx=chart.getContext("2d")
const details=document.getElementById("details")

let history=[]

const SERVERS=[

"https://speed.cloudflare.com/__down?bytes=30000000",

"https://proof.ovh.net/files/10Mb.dat",

"https://speed.cloudflare.com/__down?bytes=50000000"

]

function gauge(speed){

const max=400

const p=Math.min(speed/max,1)

const offset=565-(565*p)

bar.style.strokeDashoffset=offset

speedEl.innerText=speed.toFixed(1)

}

function drawChart(){

ctx.clearRect(0,0,chart.width,chart.height)

ctx.beginPath()

ctx.moveTo(0,130-history[0])

for(let i=0;i<history.length;i++){

ctx.lineTo(i*12,130-history[i])

}

ctx.strokeStyle="#0a7cff"

ctx.lineWidth=2

ctx.stroke()

}

async function findFastestServer(){

let fastest=SERVERS[0]

let best=9999

for(let url of SERVERS){

let start=performance.now()

await fetch(url+"?bytes=1",{cache:"no-store"})

let t=performance.now()-start

if(t<best){

best=t
fastest=url

}

}

return fastest

}

async function pingTest(){

let arr=[]

for(let i=0;i<5;i++){

let s=performance.now()

await fetch("https://speed.cloudflare.com/__down?bytes=1",{cache:"no-store"})

arr.push(performance.now()-s)

}

let avg=arr.reduce((a,b)=>a+b)/arr.length

let jit=Math.sqrt(arr.map(x=>(x-avg)**2).reduce((a,b)=>a+b)/arr.length)

return{

ping:Math.round(avg),
jitter:Math.round(jit)

}

}

function createWorker(){

const code=`

self.onmessage=async e=>{

let url=e.data

let start=performance.now()

let r=await fetch(url)

let reader=r.body.getReader()

let bytes=0

while(true){

let {done,value}=await reader.read()

if(done)break

bytes+=value.length

}

let time=(performance.now()-start)/1000

self.postMessage((bytes*8)/(1024*1024*time))

}

`

return new Worker(URL.createObjectURL(new Blob([code])))

}

async function multiDownload(url){

let threads=8

let workers=[]

for(let i=0;i<threads;i++){

let worker=createWorker()

workers.push(new Promise(res=>{

worker.onmessage=e=>{

worker.terminate()
res(e.data)

}

worker.postMessage(url+"?t="+Math.random())

}))

}

let results=await Promise.all(workers)

return results.reduce((a,b)=>a+b)

}

async function uploadTest(){

let size=5*1024*1024

let data=new Uint8Array(size)

let start=performance.now()

await fetch("https://httpbin.org/post",{method:"POST",body:data})

let time=(performance.now()-start)/1000

return(size*8)/(1024*1024*time)

}

function diagnose(speed,ping,jitter){

if(ping>150)return"الخادم بعيد"

if(jitter>30)return"تذبذب بالشبكة"

if(speed<5)return"سرعة ضعيفة"

return"الاتصال ممتاز"

}

btn.onclick=async()=>{

btn.disabled=true
btn.innerText="جاري الاختبار..."

history=[]

let server=await findFastestServer()

let pj=await pingTest()

pingEl.innerText=pj.ping+" ms"
jitterEl.innerText=pj.jitter+" ms"

let down=await multiDownload(server)

downEl.innerText=down.toFixed(1)

gauge(down)

let up=await uploadTest()

upEl.innerText=up.toFixed(1)

details.innerHTML="التشخيص: <b>"+diagnose(down,pj.ping,pj.jitter)+"</b>"

btn.innerText="إعادة الاختبار"
btn.disabled=false

}

</script>

</body>
</html>
