<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Techovia Speed Test v2.0</title>
<style>
:root {
    --blue: #0a7cff;
    --bg: #f4f8ff;
    --card-bg: #fff;
    --text-main: #222;
    --text-muted: #777;
    --border: #edf2f9;
    --stat-bg: #f6f9ff;
    --calc-bg: #fff9e6;
    --calc-border: #ffd966;
    --calc-title: #7f6000;
    --calc-val: #d4a017;
    --slider-bg: #f0f4f8;
    --graph-fill: rgba(10, 124, 255, 0.05);
    --btn-sec: #444;
}

[data-theme="dark"] {
    --blue: #3b82f6;
    --bg: #0f172a;
    --card-bg: #1e293b;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --border: #334155;
    --stat-bg: #0f172a;
    --calc-bg: #3f2c00;
    --calc-border: #714a00;
    --calc-title: #fde047;
    --calc-val: #facc15;
    --slider-bg: #0f172a;
    --graph-fill: rgba(59, 130, 246, 0.1);
    --btn-sec: #334155;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text-main);
    font-family: system-ui, -apple-system, tahoma, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 10px;
    box-sizing: border-box;
    transition: background 0.3s, color 0.3s;
}

.card {
    background: var(--card-bg);
    width: 100%;
    max-width: 550px;
    padding: clamp(15px, 4vw, 25px);
    border-radius: 24px;
    box-shadow: 0 15px 40px rgba(0,0,0,.08);
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: background 0.3s, box-shadow 0.3s;
}

.header-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
}

.header-controls select, .header-controls button {
    background: var(--stat-bg);
    color: var(--text-main);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-weight: bold;
}

.title {
    font-size: clamp(20px, 5vw, 26px);
    font-weight: 800;
    color: var(--blue);
    text-align: center;
}

.speed-container {
    text-align: center;
    margin: 10px 0;
}

.speed {
    font-size: clamp(36px, 8vw, 48px);
    font-weight: 900;
    color: var(--text-main);
    line-height: 1.1;
}

.quality {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: bold;
    margin-top: 5px;
}

canvas#graph {
    width: 100%;
    height: 90px;
    background: var(--stat-bg);
    border-radius: 12px;
    border: 1px solid var(--border);
}

.calc-box {
    background: var(--calc-bg);
    border: 1px dashed var(--calc-border);
    padding: 10px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.calc-box span { font-size: 12px; color: var(--calc-title); font-weight: bold;}
.calc-box b { font-size: 15px; color: var(--calc-val); }

.slider-container {
    padding: 12px;
    background: var(--slider-bg);
    border-radius: 12px;
    border: 1px solid var(--border);
}
.slider-container label { font-size: 12px; display: block; color: var(--text-muted); margin-bottom: 8px; font-weight: bold;}
input[type=range] { width: 100%; cursor: pointer; accent-color: var(--blue); }

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: 5px;
}

.stat {
    background: var(--stat-bg);
    padding: 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    text-align: center;
}
.stat span { font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 4px; font-weight: 600;}
.stat b { color: var(--blue); font-size: 13px; font-weight: 800;}

.scores-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 5px;
}

.score-box {
    background: var(--stat-bg);
    padding: 10px 5px;
    border-radius: 10px;
    border: 1px solid var(--border);
    text-align: center;
}
.score-box i { display: block; font-size: 18px; margin-bottom: 4px; font-style: normal; }
.score-box span { font-size: 10px; color: var(--text-muted); display: block; }
.score-box b { font-size: 12px; color: var(--text-main); }

.actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
}

button.primary, button.secondary {
    width: 100%;
    padding: 14px;
    border: 0;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
}
button.primary { background: var(--blue); color: #fff; }
button.secondary { background: var(--btn-sec); color: #fff; }
button:disabled { opacity: 0.6; cursor: not-allowed; }
button:active:not(:disabled) { transform: scale(0.98); }

.footer-actions {
    display: flex;
    gap: 6px;
}
.footer-btn {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-main);
    border-radius: 10px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
}

#devPanel {
    display: none;
    margin-top: 10px;
    padding: 10px;
    background: #000;
    color: #0f0;
    font-family: monospace;
    font-size: 10px;
    border-radius: 10px;
    text-align: left;
    direction: ltr;
    max-height: 150px;
    overflow-y: auto;
}
</style>
</head>
<body>

<div class="card">
    <div class="header-controls">
        <select id="langSelect" onchange="changeLang(this.value)">
            <option value="ar">العربية</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="tr">Türkçe</option>
            <option value="nl">Nederlands</option>
        </select>
        <div>
            <button onclick="toggleDev()">⚙️ Dev</button>
            <button id="themeToggle" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <div class="title">Techovia Speed Test</div>
    
    <div class="speed-container">
        <div class="speed" id="speed">0 MB/s</div>
        <div id="timer" style="font-size: 12px; color: var(--text-muted); font-weight: bold;">جاهز للفحص</div>
        <div class="quality" id="quality">--- | <span id="resExpected">Auto</span></div>
    </div>

    <canvas id="graph" width="400" height="90"></canvas>

    <div class="calc-box">
        <span data-i18n="time1gb">زمن التحميل المتوقع (1 GB)</span>
        <b id="time1gb">--:--</b>
    </div>

    <div class="slider-container">
        <label id="sliderLabel"><span data-i18n="customSize">حجم ملف مخصص:</span> <span id="sliderVal">1000</span> <span data-i18n="mb">ميجا</span></label>
        <input type="range" id="sizeSlider" min="1" max="4000" value="1000">
        <div style="font-size: 12px; color: var(--text-muted); margin-top: 8px; font-weight: bold;">
            <span data-i18n="takes">يستغرق:</span> <b id="customTime" style="color: var(--text-main);">--:--</b>
        </div>
    </div>

    <div class="grid">
        <div class="stat"><span data-i18n="ping">الاستجابة</span><b id="ping">-</b></div>
        <div class="stat"><span data-i18n="jitter">التقلب</span><b id="jitter">-</b></div>
        <div class="stat"><span data-i18n="bloat">Bufferbloat</span><b id="bufferbloat">-</b></div>
        <div class="stat"><span data-i18n="stab">الاستقرار</span><b id="stability">-</b></div>
        
        <div class="stat"><span data-i18n="noise">التشويش</span><b id="noise">-</b></div>
        <div class="stat" style="grid-column: span 2"><span data-i18n="down">التحميل الصافي</span><b id="down">-</b></div>
        <div class="stat"><span data-i18n="up">الرفع الصافي</span><b id="up">-</b></div>
    </div>

    <div class="scores-grid">
        <div class="score-box"><i>🎮</i><span data-i18n="gaming">جودة الألعاب</span><b id="scoreGaming">-</b></div>
        <div class="score-box"><i>📹</i><span data-i18n="calls">مكالمات الفيديو</span><b id="scoreCalls">-</b></div>
        <div class="score-box"><i>🎬</i><span data-i18n="stream">البث المرئي</span><b id="scoreStream">-</b></div>
    </div>

    <div class="actions">
        <button id="btn" class="primary" data-i18n="btnQuick">فحص سريع (15ث)</button>
        <button id="btnPro" class="secondary" data-i18n="btnPro">فحص متقدم (30ث)</button>
        
        <div class="footer-actions">
            <button class="footer-btn" onclick="copyResults()" data-i18n="copy">نسخ النتائج</button>
            <button class="footer-btn" onclick="exportJSON()" data-i18n="export">تصدير JSON</button>
            <button class="footer-btn" onclick="shareResults()" data-i18n="share">مشاركة</button>
        </div>
    </div>

    <div id="devPanel"></div>
</div>

<script>
// --- PWA Setup (Auto Inject) ---
const manifest = {
    "name": "Techovia Speed Test v2.0",
    "short_name": "Techovia",
    "start_url": ".",
    "display": "standalone",
    "background_color": "#f4f8ff",
    "theme_color": "#0a7cff",
    "icons": [{"src": "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='192' height='192'><rect width='192' height='192' fill='%230a7cff'/></svg>", "sizes": "192x192", "type": "image/svg+xml"}]
};
const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(manifestBlob)}">`);
if ('serviceWorker' in navigator) {
    const swCode = `self.addEventListener('fetch', e => {});`;
    const swBlob = new Blob([swCode], {type: 'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}

// --- Micro API ---
window.SpeedTestAPI = {
    results: { ping: 0, jitter: 0, bufferbloat: 0, download: 0, upload: 0, stability: 0, scores: {} },
    getResults: () => window.SpeedTestAPI.results,
    getDownloadSpeed: () => window.SpeedTestAPI.results.download,
    getUploadSpeed: () => window.SpeedTestAPI.results.upload,
    getPing: () => window.SpeedTestAPI.results.ping,
    getJitter: () => window.SpeedTestAPI.results.jitter,
    getBufferbloat: () => window.SpeedTestAPI.results.bufferbloat,
    getStreamingScore: () => window.SpeedTestAPI.results.scores.streaming
};

// --- Localization ---
const dict = {
    ar: { time1gb: "زمن التحميل المتوقع (1 GB)", customSize: "حجم مخصص:", mb: "ميجا", takes: "يستغرق:", ping: "الاستجابة", jitter: "التقلب", bloat: "Bufferbloat", stab: "الاستقرار", noise: "التشويش", down: "التحميل الصافي", up: "الرفع الصافي", gaming: "جودة الألعاب", calls: "مكالمات الفيديو", stream: "البث المرئي", btnQuick: "فحص سريع (15ث)", btnPro: "فحص متقدم (30ث)", copy: "نسخ النتائج", export: "تصدير JSON", share: "مشاركة", ready: "جاهز للفحص", conn: "جاري الاتصال...", downing: "جاري فحص التحميل...", uping: "جاري فحص الرفع...", done: "انتهى الفحص", err: "حدث خطأ" },
    en: { time1gb: "Expected 1GB Time", customSize: "Custom Size:", mb: "MB", takes: "Takes:", ping: "Ping", jitter: "Jitter", bloat: "Bufferbloat", stab: "Stability", noise: "Noise", down: "Net Download", up: "Net Upload", gaming: "Gaming Score", calls: "Video Calls", stream: "Streaming", btnQuick: "Quick Test (15s)", btnPro: "Pro Test (30s)", copy: "Copy", export: "Export JSON", share: "Share", ready: "Ready to Test", conn: "Connecting...", downing: "Downloading...", uping: "Uploading...", done: "Test Complete", err: "Error" }
    // (Other languages fallback to EN/AR logic via translation manager in production, using EN/AR here for brevity)
};

let currentLang = localStorage.getItem('techovia_lang') || (navigator.language.startsWith('ar') ? 'ar' : 'en');
document.getElementById('langSelect').value = currentLang;

function changeLang(l) {
    currentLang = dict[l] ? l : 'en';
    localStorage.setItem('techovia_lang', currentLang);
    document.getElementById("html-root").setAttribute("lang", currentLang);
    document.getElementById("html-root").setAttribute("dir", currentLang === 'ar' ? 'rtl' : 'ltr');
    
    document.querySelectorAll('[data-i18n]').forEach(el => {
        el.innerText = dict[currentLang][el.getAttribute('data-i18n')] || el.innerText;
    });
}
changeLang(currentLang);

// --- Theme ---
let isDark = localStorage.getItem('techovia_theme') === 'dark';
if(isDark) document.getElementById('html-root').setAttribute('data-theme', 'dark');

function toggleTheme() {
    isDark = !isDark;
    document.getElementById('html-root').setAttribute('data-theme', isDark ? 'dark' : 'light');
    localStorage.setItem('techovia_theme', isDark ? 'dark' : 'light');
}

function toggleDev() {
    const p = document.getElementById('devPanel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function updateDevLog(data) {
    const p = document.getElementById('devPanel');
    p.innerText = JSON.stringify({
        engine: "Techovia v2.0 Multi-Connection",
        connections: 4,
        browser: navigator.userAgent,
        live_data: data
    }, null, 2);
}

// --- Core UI Elements ---
const speedEl = document.getElementById("speed");
const timerEl = document.getElementById("timer");
const qualityEl = document.getElementById("quality");
const resExpected = document.getElementById("resExpected");
const pingEl = document.getElementById("ping");
const jitterEl = document.getElementById("jitter");
const bloatEl = document.getElementById("bufferbloat");
const downEl = document.getElementById("down");
const upEl = document.getElementById("up");
const stabilityEl = document.getElementById("stability");
const noiseEl = document.getElementById("noise");
const time1gbEl = document.getElementById("time1gb");
const sliderVal = document.getElementById("sliderVal");
const sizeSlider = document.getElementById("sizeSlider");
const customTimeEl = document.getElementById("customTime");
const btn = document.getElementById("btn");
const btnPro = document.getElementById("btnPro");
const graph = document.getElementById("graph").getContext("2d");

const sGaming = document.getElementById("scoreGaming");
const sCalls = document.getElementById("scoreCalls");
const sStream = document.getElementById("scoreStream");

let speeds = [];
let currentMax = 5;
let lastFinalSpeed = 0;
let basePingMs = 0;

function formatTime(seconds) {
    if (isNaN(seconds) || seconds === Infinity) return "--:--";
    let h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60), s = Math.floor(seconds % 60);
    return h > 0 ? `${h}h ${m}m ${s}s` : `${m}m ${s}s`;
}

function updateCalculators(speedMB) {
    if (speedMB <= 0) return;
    time1gbEl.innerText = formatTime(1024 / speedMB);
    customTimeEl.innerText = formatTime(sizeSlider.value / speedMB);
}

sizeSlider.oninput = () => {
    sliderVal.innerText = sizeSlider.value;
    if (lastFinalSpeed > 0) updateCalculators(lastFinalSpeed);
};

function formatSpeed(mbs) {
    return mbs >= 1 ? mbs.toFixed(2) + " MB/s" : (mbs * 1024).toFixed(0) + " KB/s";
}

function calcScores(dMbs, uMbs, ping, jitter, bloat) {
    // Quality text
    let qTxt = dMbs > 12.5 ? "ممتاز 🚀" : dMbs > 4 ? "جيد جداً" : dMbs > 1.25 ? "جيد" : dMbs > 0.5 ? "متوسط" : "ضعيف";
    
    // Video Resolution Target
    let res = dMbs > 50 ? "8K Ultra" : dMbs > 20 ? "4K UHD" : dMbs > 8 ? "1440p 2K" : dMbs > 4 ? "1080p HD" : dMbs > 2 ? "720p" : "480p";
    resExpected.innerText = res;

    // Gaming Score (A, B, C, D)
    let gScore = (ping + jitter + bloat) < 60 ? "A+ 🟢" : (ping + jitter + bloat) < 120 ? "B 🟡" : "C 🟠";
    sGaming.innerText = gScore;

    // Video Calls
    let cScore = (uMbs > 2 && dMbs > 5 && ping < 100) ? "Excellent" : (uMbs > 0.5 && dMbs > 2) ? "Good" : "Poor";
    sCalls.innerText = cScore;

    // Streaming Score
    let stScore = (dMbs * 8); // Mbps
    sStream.innerText = stScore.toFixed(0) + " Mbps";
    
    window.SpeedTestAPI.results.scores = { general: qTxt, resolution: res, gaming: gScore, calls: cScore, streaming: stScore };
    return qTxt;
}

function drawGraph() {
    graph.clearRect(0, 0, 400, 90);
    if (!speeds.length) return;
    graph.beginPath();
    graph.moveTo(0, 90);
    speeds.forEach((s, i) => {
        let x = i * (400 / (speeds.length - 1 || 1));
        let y = 90 - Math.min((s / currentMax * 75), 85);
        graph.lineTo(x, y);
    });
    graph.lineTo(400, 90);
    graph.fillStyle = document.documentElement.getAttribute('data-theme') === 'dark' ? "rgba(59, 130, 246, 0.15)" : "rgba(10, 124, 255, 0.08)";
    graph.fill();

    graph.beginPath();
    speeds.forEach((s, i) => {
        let x = i * (400 / (speeds.length - 1 || 1));
        let y = 90 - Math.min((s / currentMax * 75), 85);
        if (i === 0) graph.moveTo(x, y);
        else graph.lineTo(x, y);
    });
    graph.strokeStyle = document.documentElement.getAttribute('data-theme') === 'dark' ? "#3b82f6" : "#0a7cff";
    graph.lineWidth = 2.5;
    graph.stroke();
}

async function pingTest() {
    let arr = [];
    for (let i = 0; i < 6; i++) {
        let s = performance.now();
        try {
            await fetch("https://speed.cloudflare.com/__down?bytes=0", { cache: "no-store", priority: "high" });
            arr.push(performance.now() - s);
        } catch(e) {}
    }
    let avg = arr.length ? arr.reduce((a, b) => a + b) / arr.length : 0;
    let jitter = arr.length ? Math.sqrt(arr.map(x => (x - avg) ** 2).reduce((a, b) => a + b) / arr.length) : 0;
    basePingMs = avg;
    return { ping: Math.round(avg), jitter: Math.round(jitter) };
}

async function runEngine(seconds, type) {
    let start = performance.now();
    let bytes = 0;
    let isAborted = false;
    currentMax = 5; 
    let activePings = [];

    // Multi-Connection Array (4 streams)
    let controllers = Array.from({length: 4}, () => new AbortController());
    
    // Bufferbloat Tracker
    let bloatInterval = setInterval(async () => {
        let ts = performance.now();
        try {
            await fetch("https://speed.cloudflare.com/__down?bytes=0", { cache: "no-store", priority: "high" });
            activePings.push(performance.now() - ts);
        } catch(e) {}
    }, 1000);

    const timeout = setTimeout(() => {
        isAborted = true;
        controllers.forEach(c => c.abort());
        clearInterval(bloatInterval);
    }, seconds * 1000);

    let url = type === 'down' ? "https://speed.cloudflare.com/__down?bytes=250000000" : "https://speed.cloudflare.com/__up";
    
    let fetchPromises = controllers.map(async (c) => {
        try {
            let opts = { cache: "no-store", signal: c.signal };
            if(type === 'up') {
                opts.method = "POST";
                opts.body = new Uint8Array(10 * 1024 * 1024); // 10MB chunk per connection
            }
            let r = await fetch(url, opts);
            if(type === 'down' && r.body) {
                let reader = r.body.getReader();
                while (!isAborted) {
                    let { done, value } = await reader.read();
                    if (done || isAborted) break;
                    bytes += value.length;
                }
            } else if (type === 'up') {
                // Approximate up progress if fetch upload stream isn't fully supported
                bytes += 10 * 1024 * 1024;
            }
        } catch (e) {}
    });

    // UI Updater Loop
    let uiLoop = setInterval(() => {
        if(isAborted) { clearInterval(uiLoop); return; }
        let t = (performance.now() - start) / 1000;
        let speedMB = (bytes) / (1024 * 1024 * t);
        if (speedMB > currentMax * 0.8) currentMax = speedMB * 1.5;

        speedEl.innerText = formatSpeed(speedMB);
        if(type === 'down') updateCalculators(speedMB);
        
        speeds.push(speedMB);
        if (speeds.length > 80) speeds.shift();
        drawGraph();
        updateDevLog({ phase: type, speed_mbs: speedMB, current_bytes: bytes });
    }, 250);

    await Promise.all(fetchPromises);
    clearInterval(uiLoop);
    clearInterval(bloatInterval);

    let totalTime = (performance.now() - start) / 1000;
    let finalSpeedMB = (bytes) / (1024 * 1024 * totalTime);
    
    let avgBloat = activePings.length ? activePings.reduce((a,b)=>a+b,0)/activePings.length : basePingMs;
    let bloatDiff = Math.max(0, Math.round(avgBloat - basePingMs));

    let avg = speeds.reduce((a, b) => a + b, 0) / speeds.length;
    let stdev = speeds.length ? Math.sqrt(speeds.map(x => (x - avg) ** 2).reduce((a, b) => a + b, 0) / speeds.length) : 0;
    let stability = Math.max(0, 100 - (stdev / (avg||1) * 100));
    let noise = (stdev / (avg||1) * 10).toFixed(1);

    return { speed: finalSpeedMB, stability: stability.toFixed(0), noise: noise, bloat: bloatDiff };
}

async function startTest(duration) {
    btn.disabled = btnPro.disabled = true;
    speeds = []; lastFinalSpeed = 0;
    speedEl.innerText = "...";
    timerEl.innerText = dict[currentLang].conn;
    
    try {
        let pj = await pingTest();
        pingEl.innerText = pj.ping + " ms";
        jitterEl.innerText = pj.jitter + " ms";
        window.SpeedTestAPI.results.ping = pj.ping;
        window.SpeedTestAPI.results.jitter = pj.jitter;

        // Download Phase
        timerEl.innerText = dict[currentLang].downing;
        let downRes = await runEngine(duration * 0.6, 'down');
        downEl.innerText = formatSpeed(downRes.speed);
        stabilityEl.innerText = downRes.stability + "%";
        noiseEl.innerText = downRes.noise + " dB";
        bloatEl.innerText = "+" + downRes.bloat + " ms";
        lastFinalSpeed = downRes.speed;
        updateCalculators(downRes.speed);
        
        window.SpeedTestAPI.results.download = downRes.speed;
        window.SpeedTestAPI.results.bufferbloat = downRes.bloat;
        window.SpeedTestAPI.results.stability = downRes.stability;

        // Upload Phase
        speeds = [];
        timerEl.innerText = dict[currentLang].uping;
        let upRes = await runEngine(duration * 0.4, 'up');
        upEl.innerText = formatSpeed(upRes.speed);
        window.SpeedTestAPI.results.upload = upRes.speed;

        // Finalize
        let q = calcScores(downRes.speed, upRes.speed, pj.ping, pj.jitter, downRes.bloat);
        qualityEl.innerHTML = `${q} | <span style="color:var(--blue)">${resExpected.innerText}</span>`;
        speedEl.innerText = formatSpeed(downRes.speed); // Revert main display to download
        timerEl.innerText = dict[currentLang].done;

        updateDevLog(window.SpeedTestAPI.results);

    } catch (e) {
        timerEl.innerText = dict[currentLang].err;
    }

    btn.disabled = btnPro.disabled = false;
}

btn.onclick = () => startTest(15);
btnPro.onclick = () => startTest(30);

// --- Export & Share ---
function copyResults() {
    let text = `Techovia Speed Test v2.0\nDown: ${window.SpeedTestAPI.results.download.toFixed(2)} MB/s\nUp: ${window.SpeedTestAPI.results.upload.toFixed(2)} MB/s\nPing: ${window.SpeedTestAPI.results.ping}ms`;
    navigator.clipboard.writeText(text);
    alert("تم النسخ!");
}
function exportJSON() {
    let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(window.SpeedTestAPI.results, null, 2));
    let node = document.createElement('a');
    node.setAttribute("href", dataStr);
    node.setAttribute("download", "techovia_results.json");
    document.body.appendChild(node);
    node.click();
    node.remove();
}
function shareResults() {
    if (navigator.share) {
        navigator.share({
            title: 'Techovia Speed Test',
            text: `سرعتي: ${window.SpeedTestAPI.results.download.toFixed(2)} MB/s عبر أداة Techovia`,
            url: window.location.href
        }).catch(console.error);
    } else {
        copyResults();
    }
}
</script>
